name: Apply major upgrade

on:
  push:
    branches:
      - agent/tsao-sci-researcher-major-upgrade
    paths:
      - "dist/upgrade-generator/**"
      - ".github/workflows/apply-major-upgrade.yml"
  pull_request:
    branches:
      - main
    paths:
      - "dist/upgrade-generator/**"
      - ".github/workflows/apply-major-upgrade.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  rebuild-validate-publish:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONNOUSERSITE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tsao-sci-researcher-major-upgrade
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install generator dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema PyYAML

      - name: Reconstruct generator and write diagnostics
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import hashlib
          import json
          import traceback
          import zlib

          base = Path("dist/upgrade-generator")
          report = {
              "expected_generator_sha256": "8f1c3267fb9412bb86d34177914ca35ca88f21573f0c11bcaf9d865a889ed079",
              "files": [],
              "segments": [],
              "success": False,
          }
          encoded_parts = []
          try:
              for path in sorted(base.glob("*")):
                  if path.is_file():
                      payload = path.read_bytes()
                      report["files"].append({
                          "path": path.as_posix(),
                          "bytes": len(payload),
                          "sha256": hashlib.sha256(payload).hexdigest(),
                      })

              for index in range(7):
                  raw_path = base / f"part-{index:02}.txt"
                  if raw_path.exists():
                      text = raw_path.read_text(encoding="utf-8").strip()
                      encoded_parts.append(text)
                      report["segments"].append({
                          "index": index,
                          "mode": "raw",
                          "paths": [raw_path.as_posix()],
                          "decoded_bytes": len(text.encode("ascii")),
                          "decoded_sha256": hashlib.sha256(text.encode("ascii")).hexdigest(),
                      })
                      continue

                  verified_subparts = sorted(base.glob(f"part-{index:02}-*.b64"))
                  legacy_subparts = sorted(base.glob(f"part-{index:02}[0-9].b64"))
                  subparts = verified_subparts or legacy_subparts
                  if not subparts:
                      raise RuntimeError(f"missing generator segment {index:02}")
                  segment_parts = []
                  for path in subparts:
                      decoded = base64.b64decode(path.read_text(encoding="utf-8").strip(), validate=True)
                      segment_parts.append(decoded)
                      encoded_parts.append(decoded.decode("ascii"))
                  segment = b"".join(segment_parts)
                  report["segments"].append({
                      "index": index,
                      "mode": "verified-subparts" if verified_subparts else "legacy-subparts",
                      "paths": [path.as_posix() for path in subparts],
                      "decoded_bytes": len(segment),
                      "decoded_sha256": hashlib.sha256(segment).hexdigest(),
                  })

              encoded = "".join(encoded_parts).encode("ascii")
              report["combined_encoded_bytes"] = len(encoded)
              report["combined_encoded_sha256"] = hashlib.sha256(encoded).hexdigest()
              compressed = base64.b85decode(encoded)
              report["compressed_bytes"] = len(compressed)
              report["compressed_sha256"] = hashlib.sha256(compressed).hexdigest()
              generator = zlib.decompress(compressed)
              digest = hashlib.sha256(generator).hexdigest()
              report["generator_bytes"] = len(generator)
              report["generator_sha256"] = digest
              if digest != report["expected_generator_sha256"]:
                  raise RuntimeError(
                      f"generator checksum mismatch: {digest} != {report['expected_generator_sha256']}"
                  )
              source = generator.decode("utf-8")
              invalid_prefix = "import sys\nfrom __future__ import annotations\n"
              valid_prefix = "from __future__ import annotations\nimport sys\n"
              if source.startswith(invalid_prefix):
                  source = valid_prefix + source[len(invalid_prefix):]
              executable = source.encode("utf-8")
              report["executable_generator_sha256"] = hashlib.sha256(executable).hexdigest()
              Path("/tmp/tsr_upgrade_generator.py").write_bytes(executable)
              Path("/tmp/generator-ok").write_text("ok\n", encoding="utf-8")
              report["success"] = True
          except Exception as exc:
              report["error_type"] = type(exc).__name__
              report["error"] = str(exc)
              report["traceback"] = traceback.format_exc()
          finally:
              Path("generator-diagnostic.json").write_text(
                  json.dumps(report, ensure_ascii=False, indent=2) + "\n",
                  encoding="utf-8",
              )
              print(json.dumps(report, ensure_ascii=False, indent=2))
          PY

      - name: Upload generator diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generator-diagnostic
          path: generator-diagnostic.json

      - name: Validate generator reconstruction
        run: test -f /tmp/generator-ok

      - name: Generate v0.5.0 source tree
        run: python /tmp/tsr_upgrade_generator.py

      - name: Remove bootstrap material and regenerate indexes
        shell: bash
        run: |
          rm -rf dist/upgrade-generator dist/upgrade-payload
          rm -f .github/workflows/apply-major-upgrade.yml
          rm -f generator-diagnostic.json
          python scripts/build_capability_index.py --write
          python scripts/generate_checksums.py --write

      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile generated Python
        run: |
          export PYTHONPYCACHEPREFIX="$RUNNER_TEMP/tsr-pycache"
          python -m compileall -q scripts tests

      - name: Run 53-layered software and scientific tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Run 15-scenario benchmark gate
        run: python scripts/run_benchmarks.py

      - name: Mutation gate
        run: python scripts/run_mutation_smoke.py

      - name: Performance gate
        run: python scripts/performance_smoke.py

      - name: Security gate
        run: python scripts/security_scan.py

      - name: Release rebuild gate
        run: python scripts/validate_release.py

      - name: Verify clean source tree
        shell: bash
        run: |
          python scripts/audit_repository.py
          python scripts/generate_checksums.py --check
          test ! -e dist/upgrade-generator
          test ! -e dist/upgrade-payload
          test ! -e .github/workflows/apply-major-upgrade.yml
          test ! -e generator-diagnostic.json

      - name: Commit verified v0.5.0 source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "feat: major TsaoSciResearcher v0.5.0 upgrade"
          git push origin HEAD:agent/tsao-sci-researcher-major-upgrade
