name: Diagnose current v0.5.2 tree

on:
  push:
    branches: [main]
    paths:
      - .github/current-v052-diagnose-trigger

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONNOUSERSITE: "1"
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact dependencies
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
          python -m pip check
      - name: Format and diagnose final tree
        shell: bash
        run: |
          set -euo pipefail
          python -m ruff format scripts/audit_repository.py tests/test_handoff_cli.py tests/test_named_capabilities.py
          rm .github/workflows/diagnose-current-v052.yml .github/current-v052-diagnose-trigger
          python scripts/generate_checksums.py --write
          python - <<'PY'
          from __future__ import annotations

          import json
          import subprocess
          from pathlib import Path

          commands = {
              "audit_repository": ["python", "scripts/audit_repository.py"],
              "full_pytest": ["python", "-m", "pytest", "-q", "-p", "hypothesis.extra.pytestplugin"],
              "ruff_format": ["python", "-m", "ruff", "format", "--check", "scripts", "tsao_researcher", "tests"],
              "ruff_lint": ["python", "-m", "ruff", "check", "scripts", "tsao_researcher", "tests"],
              "mypy": ["python", "-m", "mypy", "scripts", "tsao_researcher"],
              "bandit": ["python", "-m", "bandit", "-q", "-lll", "-r", "scripts", "tsao_researcher"],
              "mutation": ["python", "scripts/run_mutation_smoke.py", "--json-out", "/tmp/mutation.json"],
              "performance": ["python", "scripts/performance_smoke.py", "--json-out", "/tmp/performance.json"],
              "package_a": ["python", "scripts/package_release.py", "--out", "/tmp/dist-a"],
              "package_b": ["python", "scripts/package_release.py", "--out", "/tmp/dist-b"],
          }
          results = {}
          for name, command in commands.items():
              completed = subprocess.run(command, capture_output=True, text=True)
              output = (completed.stdout + "\n" + completed.stderr).strip()
              results[name] = {
                  "exit_code": completed.returncode,
                  "command": command,
                  "tail": output[-12000:],
              }
          archive_a = Path("/tmp/dist-a/TsaoSciResearcher-v0.5.2.zip")
          archive_b = Path("/tmp/dist-b/TsaoSciResearcher-v0.5.2.zip")
          results["byte_identical_release"] = {
              "exit_code": 0 if archive_a.is_file() and archive_b.is_file() and archive_a.read_bytes() == archive_b.read_bytes() else 1,
              "tail": "byte-identical" if archive_a.is_file() and archive_b.is_file() and archive_a.read_bytes() == archive_b.read_bytes() else "release archives missing or different",
          }
          Path(".github/current-v052-diagnostics.json").write_text(
              json.dumps(results, ensure_ascii=False, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Commit formatted sources and diagnostics
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/audit_repository.py tests/test_handoff_cli.py tests/test_named_capabilities.py .github/current-v052-diagnostics.json
          git commit -m 'ci: capture current v0.5.2 diagnostics'
          git push origin HEAD:main
