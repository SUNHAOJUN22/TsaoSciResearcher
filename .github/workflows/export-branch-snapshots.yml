name: Export TsaoSciResearcher branch snapshots

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'agent/single-main-consolidation'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: main
            ref: main
          - label: v040-reaudit
            ref: agent/tsao-sci-researcher-v040-reaudit
          - label: v040-vnext
            ref: agent/vnext-0.4.0
          - label: v050-autonomous
            ref: agent/autonomous-v0.5.0
          - label: single-main
            ref: agent/single-main-consolidation
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.ref }}
          fetch-depth: 1
      - name: Build deterministic source snapshot
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse HEAD > SNAPSHOT_COMMIT.txt
          git ls-files -z | LC_ALL=C sort -z | tar --null -T - --no-recursion --owner=0 --group=0 --numeric-owner --mtime='UTC 1980-01-01' -czf "${{ matrix.label }}.tar.gz"
          sha256sum "${{ matrix.label }}.tar.gz" > "${{ matrix.label }}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: tsr-snapshot-${{ matrix.label }}
          path: |
            ${{ matrix.label }}.tar.gz
            ${{ matrix.label }}.sha256
            SNAPSHOT_COMMIT.txt
          include-hidden-files: true
          if-no-files-found: error
