name: Diagnose dashboard Ruff once

on:
  push:
    branches: [main]
    paths:
      - .github/diagnose-dashboard-ruff-trigger

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-ci.lock
      - name: Capture Ruff diagnostics
        shell: bash
        run: |
          set +e
          python -m ruff check scripts/build_test_dashboard.py scripts/finalize_test_dashboard.py > .github/dashboard-ruff-diagnostics.txt 2>&1
          STATUS=$?
          printf '\nexit_code=%s\n' "$STATUS" >> .github/dashboard-ruff-diagnostics.txt
          cat .github/dashboard-ruff-diagnostics.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/dashboard-ruff-diagnostics.txt
          git commit -m 'ci: capture dashboard Ruff diagnostics'
          git push origin HEAD:main
