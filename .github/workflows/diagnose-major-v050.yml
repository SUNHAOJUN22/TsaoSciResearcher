name: Diagnose generated v0.5.0 candidate

on:
  push:
    branches: [agent/tsao-sci-researcher-major-upgrade]
    paths:
      - .github/workflows/diagnose-major-v050.yml
      - dist/upgrade-generator/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose-generated-candidate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONDONTWRITEBYTECODE: '1'
      PYTHONNOUSERSITE: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tsao-sci-researcher-major-upgrade
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install diagnostic dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema PyYAML
      - name: Reconstruct verified generator
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64, hashlib, zlib
          base = Path('dist/upgrade-generator')
          parts = []
          selected_files = []
          for index in range(7):
              raw = base / f'part-{index:02}.txt'
              if raw.exists():
                  parts.append(raw.read_text(encoding='utf-8').strip())
                  selected_files.append(str(raw))
                  continue
              verified = sorted(base.glob(f'part-{index:02}-*.b64'))
              legacy = sorted(base.glob(f'part-{index:02}[0-9].b64'))
              selected = verified or legacy
              if not selected:
                  raise SystemExit(f'missing generator segment {index:02}')
              for path in selected:
                  parts.append(base64.b64decode(path.read_text(encoding='utf-8').strip(), validate=True).decode('ascii'))
                  selected_files.append(str(path))
          generator = zlib.decompress(base64.b85decode(''.join(parts).encode('ascii')))
          expected = '8f1c3267fb9412bb86d34177914ca35ca88f21573f0c11bcaf9d865a889ed079'
          actual = hashlib.sha256(generator).hexdigest()
          if actual != expected:
              raise SystemExit(f'generator checksum mismatch: {actual} != {expected}')
          source = generator.decode('utf-8').replace(
              'import sys\nfrom __future__ import annotations\n',
              'from __future__ import annotations\nimport sys\n',
              1,
          )
          Path('/tmp/tsr_upgrade_generator.py').write_text(source, encoding='utf-8')
          Path('/tmp/generator-files.txt').write_text('\n'.join(selected_files), encoding='utf-8')
          print(f'generator verified: sha256={actual}, bytes={len(generator)}')
          PY
      - name: Generate candidate source tree
        run: python /tmp/tsr_upgrade_generator.py
      - name: Remove bootstrap transport
        run: |
          rm -rf dist/upgrade-generator dist/upgrade-payload dist/upgrade-patch
          rm -f .github/workflows/apply-major-upgrade.yml
          rm -f generator-diagnostic.json generator-run.log generator-run.status
      - name: Run post-generation commands independently
        id: post
        continue-on-error: true
        run: |
          set +e
          mkdir -p /tmp/v050-diagnostics
          run_one() {
            name="$1"; shift
            echo "===== $name =====" | tee "/tmp/v050-diagnostics/${name}.log"
            "$@" >> "/tmp/v050-diagnostics/${name}.log" 2>&1
            code=$?
            echo "$code" > "/tmp/v050-diagnostics/${name}.status"
            cat "/tmp/v050-diagnostics/${name}.log"
            echo "exit=$code"
          }
          run_one build_capability_index python scripts/build_capability_index.py --write
          run_one generate_checksums python scripts/generate_checksums.py --write
          run_one validate_structure python scripts/validate_structure.py
          python - <<'PY'
          import hashlib, json
          from pathlib import Path
          root = Path('.')
          diag = Path('/tmp/v050-diagnostics')
          report = {
              'version': (root / 'VERSION').read_text(encoding='utf-8').strip() if (root / 'VERSION').exists() else None,
              'files_after_generation': sum(1 for p in root.rglob('*') if p.is_file() and '.git' not in p.parts),
              'commands': {},
              'key_paths': {},
          }
          for status_path in sorted(diag.glob('*.status')):
              name = status_path.stem
              log = (diag / f'{name}.log').read_text(encoding='utf-8', errors='replace')
              report['commands'][name] = {
                  'exit': int(status_path.read_text().strip()),
                  'log_tail': log.splitlines()[-120:],
              }
          for rel in ['VERSION','SKILL.md','capabilities/index.json','capabilities/index.md','CHECKSUMS.sha256','pyproject.toml','requirements-dev.txt']:
              path = root / rel
              report['key_paths'][rel] = {
                  'exists': path.exists(),
                  'bytes': path.stat().st_size if path.exists() and path.is_file() else None,
                  'sha256': hashlib.sha256(path.read_bytes()).hexdigest() if path.exists() and path.is_file() else None,
              }
          out = root / 'docs' / 'GENERATED_V050_DIAGNOSTICS.json'
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(report, indent=2, sort_keys=True), encoding='utf-8')
          print(out.read_text(encoding='utf-8'))
          PY
      - name: Commit generated candidate and diagnostics for review
        if: always()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -f .github/workflows/diagnose-major-v050.yml
          git add -A
          git diff --cached --stat
          if ! git diff --cached --quiet; then
            git commit -m 'chore: stage generated v0.5.0 candidate with diagnostics'
            git push origin HEAD:agent/tsao-sci-researcher-major-upgrade
          fi
