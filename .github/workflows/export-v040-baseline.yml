name: Export v0.4.0 performance baseline

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/export-v040-baseline.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/vnext-0.4.0
      - name: Create deterministic source archive
        run: |
          python - <<'PY'
          from pathlib import Path
          import zipfile
          root=Path('.')
          out=Path('/tmp/TsaoSciResearcher-v0.4.0-baseline.zip')
          epoch=(1980,1,1,0,0,0)
          with zipfile.ZipFile(out,'w',compression=zipfile.ZIP_DEFLATED,compresslevel=9) as z:
              for path in sorted(p for p in root.rglob('*') if p.is_file() and '.git' not in p.parts):
                  info=zipfile.ZipInfo(path.as_posix(),epoch)
                  info.compress_type=zipfile.ZIP_DEFLATED
                  info.external_attr=(0o100644<<16)
                  z.writestr(info,path.read_bytes())
          print(out,out.stat().st_size)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: v040-performance-baseline
          path: /tmp/TsaoSciResearcher-v0.4.0-baseline.zip
          retention-days: 7
