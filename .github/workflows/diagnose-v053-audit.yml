name: Diagnose current v0.5.3 repository audit once

on:
  push:
    branches: [main]
    paths:
      - .github/v053-audit-diagnose-trigger

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONNOUSERSITE: "1"
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
      - name: Build simulated permanent tree and record audit JSON
        shell: bash
        run: |
          rm -f .github/workflows/diagnose-v053-audit.yml
          rm -f .github/v053-audit-diagnose-trigger .github/v053-audit-result.json
          rm -f .github/workflows/finalize-v053-current.yml
          rm -f .github/v053-finalize-trigger .github/v053-finalize-status.json
          rm -f .github/workflows/tsao-main-integration-once.yml .github/tsao-v053-integration-status.json
          rm -f .github/workflows/finalize-test-dashboard.yml .github/workflows/finalize-test-dashboard-v2.yml
          rm -f .github/finalize-test-dashboard-trigger .github/finalize-test-dashboard-v2-trigger .github/finalize-test-dashboard-status.json
          rm -f .github/workflows/dashboard-ruff-diagnose.yml .github/dashboard-ruff-diagnose-trigger .github/dashboard-ruff-diagnostics.txt
          rm -f .github/workflows/fix-dashboard-sources.yml .github/dashboard-source-fix-trigger
          rm -f scripts/finalize_test_dashboard.py
          python -m ruff format scripts tsao_researcher tests
          python scripts/build_research_quality_dashboard.py --write
          python scripts/build_readme_facts.py --write
          python scripts/build_validation_evidence.py --write --parent-commit "$GITHUB_SHA" --run-id "$GITHUB_RUN_ID" --evidence-date "2026-07-23"
          python scripts/build_test_dashboard.py --write
          python scripts/build_engineering_report.py --write
          python scripts/generate_checksums.py --write
          set +e
          python scripts/audit_repository.py --json > /tmp/v053-audit.json
          rc=$?
          set -e
          cp /tmp/v053-audit.json .github/v053-audit-result.json
          git reset
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/v053-audit-result.json
          git commit -m 'ci: record v0.5.3 repository audit diagnostics [skip ci]'
          git push origin HEAD:main
          echo "audit_exit_code=$rc"
