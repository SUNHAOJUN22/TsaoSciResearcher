name: Finalize verified test dashboard once

on:
  push:
    branches: [main]
    paths:
      - .github/finalize-test-dashboard-trigger

permissions:
  contents: write

concurrency:
  group: finalize-test-dashboard-once
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONNOUSERSITE: "1"
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

jobs:
  heartbeat:
    name: dashboard-validation-heartbeat
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Publish running state
        env:
          RUN_ID: ${{ github.run_id }}
          VALIDATED_COMMIT: ${{ github.sha }}
        shell: bash
        run: |
          python - <<'PY2'
          import json
          import os
          from pathlib import Path
          Path('.github/finalize-test-dashboard-status.json').write_text(
              json.dumps({
                  'status': 'RUNNING',
                  'run_id': int(os.environ['RUN_ID']),
                  'validated_commit': os.environ['VALIDATED_COMMIT'],
              }, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY2
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/finalize-test-dashboard-status.json
          git commit -m 'ci: mark test-dashboard validation running'
          git push origin HEAD:main

  compatibility:
    needs: heartbeat
    name: dashboard-compatibility-${{ matrix.os }}-py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact dependencies and package
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
          python -m pip check
      - name: Compile runtime and dashboard generator
        env:
          PYTHONPYCACHEPREFIX: ${{ runner.temp }}/tsr-pycache
        run: python -m compileall -q scripts tsao_researcher tests
      - name: Cross-platform critical tests
        run: >-
          python -m pytest -q -p hypothesis.extra.pytestplugin
          tests/test_archive_safety.py
          tests/test_common.py
          tests/test_install.py
          tests/test_project_state.py
          tests/test_runtime_v2.py
          tests/test_handoff_cli.py
          tests/test_named_capabilities.py

  finalize:
    name: materialize-dashboard-and-run-full-validation
    needs: compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact dependencies and package
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
          python -m pip check
      - name: Materialize permanent dashboard tree
        env:
          VALIDATED_COMMIT: ${{ github.sha }}
          VALIDATED_RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/finalize-test-dashboard.yml
          rm -f .github/finalize-test-dashboard-trigger
          rm -f .github/finalize-test-dashboard-status.json
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import textwrap
          from datetime import datetime, timezone
          from pathlib import Path

          english_path = Path("README.md")
          english = english_path.read_text(encoding="utf-8")
          english_section = textwrap.dedent(
              """\
              ## Test dashboard

              ![Automated test dashboard](docs/test-dashboard.svg)

              - [Open the interactive HTML dashboard](docs/test-dashboard.html)
              - [Read the machine-readable validation evidence](docs/VALIDATION_EVIDENCE.json)

              The dashboard is generated from recorded validation evidence and checked in CI. It visualizes software gates; it does not replace scientific review or human approval.

              """
          )
          marker = "## Design verification\n"
          if "## Test dashboard\n" not in english:
              if english.count(marker) != 1:
                  raise SystemExit("README.md design-verification marker mismatch")
              english = english.replace(marker, english_section + marker)
          english_path.write_text(english, encoding="utf-8", newline="\n")
          Path("README_EN.md").write_text(english, encoding="utf-8", newline="\n")

          chinese_path = Path("README.zh-CN.md")
          chinese = chinese_path.read_text(encoding="utf-8")
          chinese_section = textwrap.dedent(
              """\
              ## 测试可视化

              ![自动测试仪表板](docs/test-dashboard.svg)

              - [打开可交互 HTML 仪表板](docs/test-dashboard.html)
              - [查看机器可读验证证据](docs/VALIDATION_EVIDENCE.json)

              仪表板由已记录的验证证据自动生成并由 CI 校验。它展示软件门禁结果，不替代科学结论或人工审批。

              """
          )
          zh_marker = "## 详细对照证据\n"
          if "## 测试可视化\n" not in chinese:
              if chinese.count(zh_marker) != 1:
                  raise SystemExit("README.zh-CN.md evidence marker mismatch")
              chinese = chinese.replace(zh_marker, chinese_section + zh_marker)
          chinese_path.write_text(chinese, encoding="utf-8", newline="\n")

          facts_path = Path("scripts/build_readme_facts.py")
          facts = facts_path.read_text(encoding="utf-8")
          old_docs = '        "docs/VALIDATION_EVIDENCE.json",\n    ]'
          new_docs = (
              '        "docs/VALIDATION_EVIDENCE.json",\n'
              '        "docs/test-dashboard.html",\n'
              '        "docs/test-dashboard.svg",\n'
              '    ]'
          )
          if "docs/test-dashboard.html" not in facts:
              if facts.count(old_docs) != 1:
                  raise SystemExit("build_readme_facts.py required-docs marker mismatch")
              facts = facts.replace(old_docs, new_docs)
          facts_path.write_text(facts, encoding="utf-8", newline="\n")

          ci_path = Path(".github/workflows/ci.yml")
          ci = ci_path.read_text(encoding="utf-8")
          old_ci = (
              "          python scripts/build_readme_facts.py --check\n"
              "          python scripts/generate_checksums.py --check"
          )
          new_ci = (
              "          python scripts/build_readme_facts.py --check\n"
              "          python scripts/build_test_dashboard.py --check\n"
              "          python scripts/generate_checksums.py --check"
          )
          if "python scripts/build_test_dashboard.py --check" not in ci:
              if ci.count(old_ci) != 1:
                  raise SystemExit("ci.yml README-facts marker mismatch")
              ci = ci.replace(old_ci, new_ci)
          ci_path.write_text(ci, encoding="utf-8", newline="\n")

          evidence_path = Path("docs/VALIDATION_EVIDENCE.json")
          evidence = json.loads(evidence_path.read_text(encoding="utf-8"))
          evidence["schema_version"] = "1.3"
          evidence["status"] = "PASS"
          evidence["evidence_date"] = datetime.now(timezone.utc).date().isoformat()
          evidence["workflow"] = {
              "name": "Finalize verified test dashboard once",
              "run_id": int(os.environ["VALIDATED_RUN_ID"]),
              "validated_commit": os.environ["VALIDATED_COMMIT"],
              "permanent_tree_simulated": True,
              "result_commit": None,
          }
          evidence["dashboard"] = {
              "status": "PASS",
              "generator": "scripts/build_test_dashboard.py",
              "html": "docs/test-dashboard.html",
              "svg": "docs/test-dashboard.svg",
          }
          evidence_path.write_text(
              json.dumps(evidence, ensure_ascii=False, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
              newline="\n",
          )
          PY
          python -m ruff check --fix scripts/build_test_dashboard.py
          python -m ruff format scripts/build_test_dashboard.py
          python scripts/build_test_dashboard.py --write
          python scripts/build_readme_facts.py --write
          python scripts/generate_checksums.py --write
      - name: Repository, README, dashboard and contract audit
        run: |
          python scripts/validate_schemas.py
          python scripts/audit_repository.py
          python scripts/validate_structure.py
          python scripts/build_readme_facts.py --check
          python scripts/build_test_dashboard.py --check
          python scripts/generate_checksums.py --check
          python scripts/build_capability_index.py --check
          python scripts/route_task.py --self-test
          python scripts/validate_figure.py examples/figure-contract.json
      - name: Complete regression
        run: python -m pytest -q -p hypothesis.extra.pytestplugin
      - name: Reverse-order regression
        run: python -m pytest -q -p hypothesis.extra.pytestplugin -p tests.reverse_order_plugin
      - name: Seeded random-order regression
        env:
          TSR_TEST_ORDER_SEED: "20260723"
        run: python -m pytest -q -p hypothesis.extra.pytestplugin -p tests.random_order_plugin
      - name: Static quality and security
        run: |
          python -m ruff format --check scripts tsao_researcher tests
          python -m ruff check scripts tsao_researcher tests
          python -m mypy scripts tsao_researcher
          python -m bandit -q -lll -r scripts tsao_researcher
      - name: Critical mutation gate
        run: python scripts/run_mutation_smoke.py --json-out /tmp/mutation-results.json
      - name: Performance gate
        run: python scripts/performance_smoke.py --json-out /tmp/performance.json
      - name: Byte-identical release
        shell: bash
        run: |
          rm -rf /tmp/dist-a /tmp/dist-b
          VERSION="$(tr -d '\r\n' < VERSION)"
          python scripts/package_release.py --out /tmp/dist-a
          python scripts/package_release.py --out /tmp/dist-b
          cmp "/tmp/dist-a/TsaoSciResearcher-v${VERSION}.zip" "/tmp/dist-b/TsaoSciResearcher-v${VERSION}.zip"
          python scripts/validate_release.py
      - name: Commit verified dashboard directly to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'docs: add verified automated-test dashboard'
          git push origin HEAD:main

  failure-report:
    name: dashboard-validation-failure-report
    if: ${{ always() && (needs.compatibility.result != 'success' || needs.finalize.result != 'success') }}
    needs: [heartbeat, compatibility, finalize]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Publish failure state
        env:
          COMPATIBILITY: ${{ needs.compatibility.result }}
          FINALIZE: ${{ needs.finalize.result }}
          RUN_ID: ${{ github.run_id }}
          VALIDATED_COMMIT: ${{ github.sha }}
        shell: bash
        run: |
          python - <<'PY2'
          import json
          import os
          from pathlib import Path
          Path('.github/finalize-test-dashboard-status.json').write_text(
              json.dumps({
                  'status': 'FAIL',
                  'run_id': int(os.environ['RUN_ID']),
                  'validated_commit': os.environ['VALIDATED_COMMIT'],
                  'jobs': {
                      'compatibility': os.environ['COMPATIBILITY'],
                      'finalize': os.environ['FINALIZE'],
                  },
              }, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY2
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/finalize-test-dashboard-status.json
          git commit -m 'ci: report test-dashboard validation failure'
          git push origin HEAD:main
