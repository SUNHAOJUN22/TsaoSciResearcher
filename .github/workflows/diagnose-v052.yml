name: Diagnose v0.5.2 finalization

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/diagnose-v052.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONNOUSERSITE: "1"
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact dependencies
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
          python -m pip check
      - name: Run serial diagnostics
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_checksums.py --write
          python - <<'PY'
          from __future__ import annotations

          import json
          import subprocess
          from pathlib import Path

          commands = {
              "validate_schemas": ["python", "scripts/validate_schemas.py"],
              "audit_repository": ["python", "scripts/audit_repository.py"],
              "validate_structure": ["python", "scripts/validate_structure.py"],
              "readme_facts": ["python", "scripts/build_readme_facts.py", "--check"],
              "checksums": ["python", "scripts/generate_checksums.py", "--check"],
              "capability_index": ["python", "scripts/build_capability_index.py", "--check"],
              "router_self_test": ["python", "scripts/route_task.py", "--self-test"],
              "figure_contract": [
                  "python",
                  "scripts/validate_figure.py",
                  "examples/figure-contract.json",
              ],
              "compile": ["python", "-m", "compileall", "-q", "scripts", "tsao_researcher", "tests"],
              "critical_tests": [
                  "python",
                  "-m",
                  "pytest",
                  "-q",
                  "-p",
                  "hypothesis.extra.pytestplugin",
                  "tests/test_archive_safety.py",
                  "tests/test_common.py",
                  "tests/test_install.py",
                  "tests/test_project_state.py",
                  "tests/test_runtime_v2.py",
                  "tests/test_handoff_cli.py",
                  "tests/test_named_capabilities.py",
              ],
              "full_pytest": [
                  "python",
                  "-m",
                  "pytest",
                  "-q",
                  "-p",
                  "hypothesis.extra.pytestplugin",
              ],
              "ruff_format": ["python", "-m", "ruff", "format", "--check", "scripts", "tsao_researcher", "tests"],
              "ruff_lint": ["python", "-m", "ruff", "check", "scripts", "tsao_researcher", "tests"],
              "mypy": ["python", "-m", "mypy", "scripts", "tsao_researcher"],
              "bandit": ["python", "-m", "bandit", "-q", "-lll", "-r", "scripts", "tsao_researcher"],
              "mutation": ["python", "scripts/run_mutation_smoke.py", "--json-out", "/tmp/mutation.json"],
              "performance": ["python", "scripts/performance_smoke.py", "--json-out", "/tmp/performance.json"],
          }
          results = {}
          for name, command in commands.items():
              completed = subprocess.run(command, capture_output=True, text=True)
              output = (completed.stdout + "\n" + completed.stderr).strip()
              results[name] = {
                  "exit_code": completed.returncode,
                  "command": command,
                  "tail": output[-10000:],
              }
          Path(".github/regression-diagnostics.json").write_text(
              json.dumps(results, ensure_ascii=False, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Commit diagnostics
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/regression-diagnostics.json
          if ! git diff --cached --quiet; then
            git commit -m 'ci: capture v0.5.2 command diagnostics'
            git push origin HEAD:main
          fi
