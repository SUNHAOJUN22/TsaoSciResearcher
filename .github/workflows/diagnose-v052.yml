name: Harden guarded CI write audit

on:
  push:
    branches: [main]
    paths:
      - .github/audit-harden-trigger

permissions:
  contents: write

jobs:
  harden-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Permit only the guarded CI evidence writer
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("scripts/audit_repository.py")
          text = path.read_text(encoding="utf-8")
          pattern = re.compile(
              r'^        if has_write and workflow\.name != "cleanup-branches\.yml":\n'
              r'^            errors\.append\(f"unexpected contents:write permission in \{workflow\.name\}"\)\n',
              re.MULTILINE,
          )
          replacement = '''        allowed_write = workflow.name == "cleanup-branches.yml"
          if workflow.name == "ci.yml" and has_write:
              guarded_markers = [
                  "permissions:\\n  contents: read",
                  "record-main-validation:",
                  "always() && github.event_name == 'push' && github.ref == 'refs/heads/main'",
                  "permissions:\\n      contents: write",
                  ".github/finalize-v052",
              ]
              missing_guarded_markers = [marker for marker in guarded_markers if marker not in text]
              if missing_guarded_markers:
                  errors.append(
                      f"guarded CI write permission is incomplete: {missing_guarded_markers}"
                  )
              else:
                  allowed_write = True
          if has_write and not allowed_write:
              errors.append(f"unexpected contents:write permission in {workflow.name}")
          '''
          updated, count = pattern.subn(replacement, text)
          if count != 1:
              raise SystemExit(f"expected one audit permission block, replaced {count}")
          path.write_text(updated, encoding="utf-8")
          PY
          python -m py_compile scripts/audit_repository.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/audit_repository.py
          git commit -m 'security: allow only guarded main CI evidence writes'
          git push origin HEAD:main
