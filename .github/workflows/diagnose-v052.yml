name: Harden guarded CI write audit

on:
  push:
    branches: [main]
    paths:
      - .github/audit-harden-trigger

permissions:
  contents: write

jobs:
  harden-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Patch audit and record status
        shell: bash
        run: |
          set -u
          python - <<'PY' > /tmp/audit-harden.log 2>&1
          from pathlib import Path

          path = Path("scripts/audit_repository.py")
          lines = path.read_text(encoding="utf-8").splitlines()
          first = '        if has_write and workflow.name != "cleanup-branches.yml":'
          second = '            errors.append(f"unexpected contents:write permission in {workflow.name}")'
          matches = [i for i, line in enumerate(lines[:-1]) if line == first and lines[i + 1] == second]
          if len(matches) != 1:
              raise SystemExit(f"expected one permission block, found {matches}")
          index = matches[0]
          replacement = [
              '        allowed_write = workflow.name == "cleanup-branches.yml"',
              '        if workflow.name == "ci.yml" and has_write:',
              '            guarded_markers = [',
              '                "permissions:\\n  contents: read",',
              '                "record-main-validation:",',
              '                "always() && github.event_name == \'push\' && github.ref == \'refs/heads/main\'",',
              '                "permissions:\\n      contents: write",',
              '                ".github/finalize-v052",',
              '            ]',
              '            missing_guarded_markers = [marker for marker in guarded_markers if marker not in text]',
              '            if missing_guarded_markers:',
              '                errors.append(',
              '                    f"guarded CI write permission is incomplete: {missing_guarded_markers}"',
              '                )',
              '            else:',
              '                allowed_write = True',
              '        if has_write and not allowed_write:',
              '            errors.append(f"unexpected contents:write permission in {workflow.name}")',
          ]
          lines[index:index + 2] = replacement
          path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
          result=$?
          python - <<PY
          import json
          from pathlib import Path
          log = Path('/tmp/audit-harden.log').read_text(encoding='utf-8', errors='replace')
          Path('.github/audit-harden-status.json').write_text(
              json.dumps({'exit_code': $result, 'log': log[-8000:]}, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY
          if [ "$result" -eq 0 ]; then
            python -m py_compile scripts/audit_repository.py
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/audit_repository.py .github/audit-harden-status.json
          git commit -m 'security: harden guarded CI evidence writes'
          git push origin HEAD:main
          exit "$result"
