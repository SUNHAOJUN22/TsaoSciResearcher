name: Export audited v0.5.0 recovery payload

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/export-v050-payload.yml

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/autonomous-v0.5.0
          fetch-depth: 1
      - name: Record payload digests
        shell: bash
        run: |
          set -euo pipefail
          find .v050-payload -type f -print0 | sort -z | xargs -0 sha256sum > v050-payload-sha256.txt
          sha256sum scripts/materialize_v050_from_release.py >> v050-payload-sha256.txt
      - name: Upload recovery inputs
        uses: actions/upload-artifact@v4
        with:
          name: audited-v050-recovery-inputs
          path: |
            .v050-payload
            scripts/materialize_v050_from_release.py
            docs/EMBEDDED_PAYLOAD_DIAGNOSTICS.json
            docs/TAIL04_ENCODING_DIAGNOSTICS.json
            v050-payload-sha256.txt
          if-no-files-found: error
