name: Finalize current-tree report wording once

on:
  push:
    branches: [main]
    paths:
      - .github/current-tree-report-trigger

permissions:
  contents: write

concurrency:
  group: finalize-current-tree-report
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONNOUSERSITE: "1"
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
  STATUS_FILE: .github/current-tree-report-status.json

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout current main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Publish observable running state
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          Path(os.environ["STATUS_FILE"]).write_text(
              json.dumps(
                  {
                      "status": "RUNNING",
                      "run_id": int(os.environ["GITHUB_RUN_ID"]),
                      "trigger_commit": os.environ["GITHUB_SHA"],
                  },
                  indent=2,
                  sort_keys=True,
              ) + "\n",
              encoding="utf-8",
              newline="\n",
          )
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$STATUS_FILE"
          git commit -m 'ci: mark current-tree report finalization running [skip ci]'
          git push origin HEAD:main

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock

      - name: Install exact dependencies and package
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
          python -m pip check

      - name: Apply current-tree report correction
        shell: bash
        run: |
          rm -f .github/workflows/finalize-current-tree-report.yml
          rm -f .github/current-tree-report-trigger "$STATUS_FILE"
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/build_engineering_report.py")
          text = path.read_text(encoding="utf-8")
          old_header = '''    content += _text(46, 760, "Recorded cross-platform baseline", 14, True)
          content += _text(
              46, 742, "These platform results are the last complete baseline, not a fresh current-tree run.", 8
          )
'''
          new_header = '''    scope = str(evidence.get("validation_scope", "unknown"))
          if scope == "current-tree":
              content += _text(46, 760, "Current-tree cross-platform validation", 14, True)
              content += _text(
                  46, 742, "The current full integration run passed all declared repository and engineering gates.", 8
              )
          else:
              content += _text(46, 760, "Recorded cross-platform baseline", 14, True)
              content += _text(
                  46, 742, "These platform results are the last complete baseline, not a fresh current-tree run.", 8
              )
'''
          if old_header not in text:
              raise SystemExit("page-two header patch anchor missing")
          text = text.replace(old_header, new_header, 1)
          text = text.replace(
              '    content += _text(46, y - 5, "Baseline and focused current-change gates", 14, True)\n',
              '    gate_heading = "Current-tree validation gates" if scope == "current-tree" else "Baseline and focused current-change gates"\n'
              '    content += _text(46, y - 5, gate_heading, 14, True)\n',
              1,
          )
          old_footer = '''    content += _text(
              46,
              68,
              "Composite PASS means the declared scopes passed; current end-to-end CI remains NOT RUN.",
              9,
              True,
          )
'''
          new_footer = '''    footer = (
              "Current-tree PASS records full end-to-end validation; scientific acceptance remains separate."
              if scope == "current-tree"
              else "Composite PASS means the declared scopes passed; current end-to-end CI remains NOT RUN."
          )
          content += _text(46, 68, footer, 9, True)
'''
          if old_footer not in text:
              raise SystemExit("page-two footer patch anchor missing")
          text = text.replace(old_footer, new_footer, 1)

          helper = '''def _page_four_current_tree(evidence: dict[str, Any]) -> str:
              content = _text(46, 790, "Current-tree validation and reproducibility", 22, True)
              provenance = evidence.get("provenance", {})
              gates = evidence.get("gates", {})
              content += _rect(46, 650, 500, 92, 0.98)
              content += _text(64, 712, "Current-tree full integration", 14, True)
              content += _text(64, 687, f"GitHub Actions run: {provenance.get('workflow_run_id', 'not recorded')}", 9)
              content += _text(64, 668, "Repository, regression, static, mutation, performance and release gates passed.", 8)
              content += _rect(46, 525, 500, 92, 0.98)
              content += _text(64, 587, "Validated source tree", 14, True)
              digest = str(provenance.get("validated_tree_sha256", "not recorded"))
              content += _text(64, 562, f"SHA-256: {digest[:64]}", 7)
              content += _text(64, 543, f"Validated files: {provenance.get('validated_file_count', 'not recorded')}", 8)
              content += _rect(46, 400, 500, 92, 0.98)
              content += _text(64, 462, "Permanent generated artifacts", 14, True)
              content += _text(64, 437, "Test dashboard, scientific-quality dashboard, PDF report and checksum: PASS", 8)
              content += _text(64, 418, f"Critical mutations killed: {gates.get('critical_mutation_killed', 'not recorded')}", 8)
              content += _text(46, 352, "Reproduction entry points", 14, True)
              command_y = 325.0
              for command in [
                  "python scripts/audit_repository.py",
                  "python -m pytest -q -p hypothesis.extra.pytestplugin",
                  "python scripts/build_test_dashboard.py --check",
                  "python scripts/build_research_quality_dashboard.py --check",
                  "python scripts/build_engineering_report.py --check",
                  "python scripts/generate_checksums.py --check",
              ]:
                  wrapped, command_y = _wrapped(60, command_y, command, width=88, size=8, leading=12, max_lines=2)
                  content += wrapped
                  command_y -= 8
              content += _text(46, 150, "Scientific boundary", 14, True)
              content += _text(60, 122, "Software PASS validates the declared repository controls and recorded source-tree digest.", 8)
              content += _text(60, 102, "It does not certify external experiments, calculations, legal conclusions or safety decisions.", 8)
              content += _text(46, 48, "All changes were published directly to main; no branch and no pull request were created.", 8, True)
              return content


'''
          anchor = "def _page_four(evidence: dict[str, Any]) -> str:\n"
          if anchor not in text or "def _page_four_current_tree" in text:
              raise SystemExit("page-four helper patch anchor invalid")
          text = text.replace(anchor, helper + anchor, 1)
          text = text.replace(
              anchor,
              anchor + '    if evidence.get("validation_scope") == "current-tree":\n        return _page_four_current_tree(evidence)\n',
              1,
          )
          path.write_text(text, encoding="utf-8", newline="\n")

          tests = Path("tests/test_visual_report_contract.py")
          test_text = tests.read_text(encoding="utf-8")
          addition = '''

          def test_current_tree_report_uses_current_tree_wording() -> None:
              expected = build_engineering_report.build()
              assert b"Current-tree full integration" in expected
              assert b"current end-to-end CI remains NOT RUN" not in expected
          '''
          if "test_current_tree_report_uses_current_tree_wording" not in test_text:
              test_text += addition
          tests.write_text(test_text, encoding="utf-8", newline="\n")
          PY
          python -m ruff format scripts/build_engineering_report.py tests/test_visual_report_contract.py

      - name: Generate current-tree evidence and reports
        shell: bash
        run: |
          python scripts/build_research_quality_dashboard.py --write
          python scripts/build_readme_facts.py --write
          python scripts/build_validation_evidence.py --write --parent-commit "$GITHUB_SHA" --run-id "$GITHUB_RUN_ID" --evidence-date "2026-07-23"
          python scripts/build_test_dashboard.py --write
          python scripts/build_engineering_report.py --write
          python scripts/generate_checksums.py --write

      - name: Run complete validation gates
        shell: bash
        run: |
          python scripts/validate_schemas.py
          python scripts/audit_repository.py
          python scripts/validate_structure.py
          python scripts/build_readme_facts.py --check
          python scripts/build_validation_evidence.py --check
          python scripts/build_test_dashboard.py --check
          python scripts/build_research_quality_dashboard.py --check
          python scripts/build_engineering_report.py --check
          python scripts/generate_checksums.py --check
          python scripts/build_capability_index.py --check
          python scripts/route_task.py --self-test
          python scripts/validate_figure.py examples/figure-contract.json
          python -m tsao_researcher quality examples/scientific-quality-check.json
          python -m pytest -q -p hypothesis.extra.pytestplugin --junitxml=artifacts/junit.xml
          python -m pytest -q -p hypothesis.extra.pytestplugin -p tests.reverse_order_plugin
          TSR_TEST_ORDER_SEED=20260723 python -m pytest -q -p hypothesis.extra.pytestplugin -p tests.random_order_plugin
          python -m ruff format --check scripts tsao_researcher tests
          python -m ruff check scripts tsao_researcher tests
          python -m mypy scripts tsao_researcher
          python -m bandit -q -lll -r scripts tsao_researcher
          python scripts/run_mutation_smoke.py --json-out artifacts/mutation-results.json
          python scripts/performance_smoke.py --json-out artifacts/performance.json
          rm -rf dist-a dist-b
          python scripts/package_release.py --out dist-a
          python scripts/package_release.py --out dist-b
          cmp dist-a/TsaoSciResearcher-v0.5.3.zip dist-b/TsaoSciResearcher-v0.5.3.zip
          python scripts/validate_release.py

      - name: Publish verified tree atomically to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          git add -A
          python - <<'PY'
          import base64
          import json
          import os
          import stat
          import subprocess
          import time
          import urllib.error
          import urllib.request
          from pathlib import Path

          repository = os.environ["REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          api_base = f"https://api.github.com/repos/{repository}"
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "TsaoSciResearcher-current-tree-report-finalizer",
          }

          def request(method: str, path: str, payload: dict | None = None) -> dict:
              body = None if payload is None else json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(api_base + path, data=body, headers=headers, method=method)
              with urllib.request.urlopen(req, timeout=60) as response:
                  raw = response.read()
              return json.loads(raw) if raw else {}

          raw_names = subprocess.check_output(["git", "diff", "--cached", "--name-only", "-z", "HEAD"])
          paths = [item.decode("utf-8") for item in raw_names.split(b"\0") if item]
          if not paths:
              raise SystemExit("no verified changes to publish")
          entries = []
          for relative in paths:
              path = Path(relative)
              if not path.exists():
                  entries.append({"path": relative, "mode": "100644", "type": "blob", "sha": None})
                  continue
              if path.is_symlink():
                  raise SystemExit(f"symbolic link is forbidden: {relative}")
              blob = request(
                  "POST",
                  "/git/blobs",
                  {"content": base64.b64encode(path.read_bytes()).decode("ascii"), "encoding": "base64"},
              )
              mode = "100755" if path.stat().st_mode & stat.S_IXUSR else "100644"
              entries.append({"path": relative, "mode": mode, "type": "blob", "sha": blob["sha"]})
          for attempt in range(1, 6):
              try:
                  ref = request("GET", "/git/ref/heads/main")
                  parent = ref["object"]["sha"]
                  parent_commit = request("GET", f"/git/commits/{parent}")
                  tree = request("POST", "/git/trees", {"base_tree": parent_commit["tree"]["sha"], "tree": entries})
                  commit = request(
                      "POST",
                      "/git/commits",
                      {
                          "message": "fix: align current-tree PDF wording with validated evidence",
                          "tree": tree["sha"],
                          "parents": [parent],
                      },
                  )
                  request("PATCH", "/git/refs/heads/main", {"sha": commit["sha"], "force": False})
                  print(f"published verified commit {commit['sha']}")
                  break
              except urllib.error.HTTPError as exc:
                  if exc.code not in {409, 422} or attempt == 5:
                      raise
                  time.sleep(attempt * 2)
          PY
