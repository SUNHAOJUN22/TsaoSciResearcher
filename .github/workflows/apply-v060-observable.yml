name: Apply verified v0.6.0 observable finalizer

on:
  push:
    branches: [main]
    paths:
      - .github/v060-observable.trigger

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONNOUSERSITE: "1"
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: main
          fetch-depth: 0

      - name: Reconstruct and apply checksum-pinned payload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          echo reconstruct > /tmp/v060-stage
          python - <<'PY'
          import base64, hashlib, io, json, os, re, stat, urllib.request, zipfile
          from pathlib import Path, PurePosixPath

          root = Path.cwd().resolve()
          controller = (root / ".github/workflows/apply-v060-blobs.yml").read_text(encoding="utf-8")
          block = controller.split("blob_shas = [", 1)[1].split("]", 1)[0]
          shas = re.findall(r'"([0-9a-f]{40})"', block)
          expected = re.search(r'expected = "([0-9a-f]{64})"', controller)
          if not shas or expected is None:
              raise SystemExit("unable to parse checksum-pinned transport contract")

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "TsaoSciResearcher-v060-observable-finalizer",
          }
          encoded_parts = []
          for index, sha in enumerate(shas):
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/git/blobs/{sha}",
                  headers=headers,
              )
              with urllib.request.urlopen(req, timeout=60) as response:
                  payload = json.load(response)
              if payload.get("sha") != sha or payload.get("encoding") != "base64":
                  raise SystemExit(f"blob contract mismatch index={index} sha={sha}")
              compact = "".join(payload["content"].split())
              encoded_parts.append(base64.b64decode(compact, validate=True).decode("ascii"))

          archive = base64.b64decode("".join(encoded_parts).replace("\r", "").replace("\n", ""), validate=True)
          actual = hashlib.sha256(archive).hexdigest()
          if actual != expected.group(1):
              raise SystemExit(f"payload digest mismatch {actual} != {expected.group(1)}")

          with zipfile.ZipFile(io.BytesIO(archive)) as package:
              infos = package.infolist()
              names = [info.filename for info in infos]
              if len(names) != len(set(names)):
                  raise SystemExit("duplicate payload member")
              count = 0
              total = 0
              for info in infos:
                  if info.is_dir() or not info.filename.startswith("payload/"):
                      continue
                  relative = PurePosixPath(*PurePosixPath(info.filename).parts[1:])
                  if not relative.parts or relative.is_absolute() or ".." in relative.parts:
                      raise SystemExit(f"unsafe payload path: {info.filename}")
                  mode = info.external_attr >> 16
                  if stat.S_ISLNK(mode):
                      raise SystemExit(f"symbolic link forbidden: {info.filename}")
                  count += 1
                  total += info.file_size
                  if count > 500 or total > 8_000_000:
                      raise SystemExit("payload safety limit exceeded")
                  target = root.joinpath(*relative.parts).resolve()
                  if not target.is_relative_to(root):
                      raise SystemExit(f"payload escaped repository: {info.filename}")
                  target.parent.mkdir(parents=True, exist_ok=True)
                  target.write_bytes(package.read(info))
                  target.chmod(0o755 if mode & stat.S_IXUSR else 0o644)
          if count < 50:
              raise SystemExit(f"payload unexpectedly small: {count}")
          print(f"verified payload sha256={actual} files={count} bytes={total}")
          PY
          rm -rf .github/v060-payload .github/v060-payload4k-test
          rm -f .github/v060-deep.trigger .github/v060-blobs.trigger .github/v060-observable.trigger
          rm -f .github/v060-observable-status.json .github/v060-diagnose-status.json .github/v060-diagnose.trigger
          rm -f .github/v060-patch.trigger .github/v060-patch2.trigger .github/v060-patch2-status.json
          rm -f .github/workflows/apply-v060-deep.yml .github/workflows/apply-v060-blobs.yml .github/workflows/apply-v060-observable.yml
          rm -f .github/workflows/diagnose-v060-reconstruct.yml .github/workflows/patch-v060-loader.yml .github/workflows/patch-v060-observable2.yml

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock

      - name: Install exact dependencies
        shell: bash
        run: |
          echo install > /tmp/v060-stage
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
          python -m pip check

      - name: Validate repository and documentation
        shell: bash
        run: |
          echo repository > /tmp/v060-stage
          python -m compileall -q scripts tsao_researcher tests
          python scripts/sync_version.py --check
          python scripts/validate_schemas.py
          python scripts/audit_repository.py
          python scripts/validate_structure.py
          python scripts/build_readme_facts.py --check
          python scripts/build_sbom.py --check
          python scripts/build_validation_evidence.py --check
          python scripts/build_test_dashboard.py --check
          python scripts/build_research_quality_dashboard.py --check
          python scripts/build_engineering_report.py --check
          python scripts/generate_checksums.py --check
          python scripts/build_capability_index.py --check
          python scripts/route_task.py --self-test
          python scripts/validate_figure.py examples/figure-contract.json
          python -m tsao_researcher quality examples/scientific-quality-check.json
          mkdocs build --strict

      - name: Run complete and order-independent regression
        shell: bash
        run: |
          echo regression > /tmp/v060-stage
          mkdir -p artifacts
          python -m pytest -q -p hypothesis.extra.pytestplugin --junitxml=artifacts/junit.xml
          python -m pytest -q -p hypothesis.extra.pytestplugin -p tests.reverse_order_plugin
          TSR_TEST_ORDER_SEED=20260724 python -m pytest -q -p hypothesis.extra.pytestplugin -p tests.random_order_plugin

      - name: Run static, type and security gates
        shell: bash
        run: |
          echo quality > /tmp/v060-stage
          python -m ruff format --check scripts tsao_researcher tests
          python -m ruff check scripts tsao_researcher tests
          python -m mypy scripts tsao_researcher
          python -m bandit -q -lll -r scripts tsao_researcher
          python -m pip_audit -r requirements-ci.lock

      - name: Run mutation, performance and distribution gates
        shell: bash
        run: |
          echo release > /tmp/v060-stage
          python scripts/run_mutation_smoke.py --json-out artifacts/mutation-results.json
          python scripts/performance_smoke.py --json-out artifacts/performance.json
          rm -rf dist-a dist-b wheelhouse
          python scripts/package_release.py --out dist-a
          python scripts/package_release.py --out dist-b
          VERSION="$(tr -d '\r\n' < VERSION)"
          cmp "dist-a/TsaoSciResearcher-v${VERSION}.zip" "dist-b/TsaoSciResearcher-v${VERSION}.zip"
          python -m build --sdist --wheel --outdir wheelhouse
          python scripts/validate_release.py
          python scripts/validate_distribution.py wheelhouse

      - name: Publish validated v0.6.0 to main
        shell: bash
        run: |
          echo publish > /tmp/v060-stage
          rm -rf artifacts dist-a dist-b wheelhouse site build .pytest_cache .mypy_cache .ruff_cache .coverage
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'feat: add v0.6.0 reproducibility and release hardening'
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Persist failure stage
        if: ${{ failure() }}
        shell: bash
        run: |
          stage="$(cat /tmp/v060-stage 2>/dev/null || echo unknown)"
          git reset --hard "$GITHUB_SHA"
          printf '{\n  "status": "FAIL",\n  "stage": "%s",\n  "run_id": %s,\n  "attempt": %s,\n  "head_sha": "%s"\n}\n' "$stage" "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" "$GITHUB_SHA" > .github/v060-observable-status.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/v060-observable-status.json
          git commit -m "ci: record v0.6.0 finalizer failure at ${stage}"
          git pull --rebase origin main
          git push origin HEAD:main
