name: Publish verified dashboard candidate once

on:
  push:
    branches: [main]
    paths:
      - .github/publish-dashboard-candidate-trigger

permissions:
  contents: write

concurrency:
  group: publish-dashboard-candidate-once
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONNOUSERSITE: "1"
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Publish run identifier
        env:
          RUN_ID: ${{ github.run_id }}
          VALIDATED_COMMIT: ${{ github.sha }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          Path('.github/publish-dashboard-candidate-status.json').write_text(
              json.dumps({
                  'status': 'RUNNING',
                  'run_id': int(os.environ['RUN_ID']),
                  'validated_commit': os.environ['VALIDATED_COMMIT'],
              }, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/publish-dashboard-candidate-status.json
          git commit -m 'ci: mark dashboard candidate publication running'
          git push origin HEAD:main

  publish:
    needs: heartbeat
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact dependencies and package
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
          python -m pip check
      - name: Build permanent candidate tree
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/finalize_test_dashboard.py
          rm -f .github/workflows/patch-dashboard-publisher.yml
          rm -f .github/patch-dashboard-publisher-trigger
          rm -f .github/workflows/publish-dashboard-candidate.yml
          rm -f .github/publish-dashboard-candidate-trigger
          rm -f .github/publish-dashboard-candidate-status.json
          python scripts/build_test_dashboard.py --write
          python scripts/build_readme_facts.py --write
          python scripts/generate_checksums.py --write
      - name: Full repository validation
        run: |
          python scripts/validate_schemas.py
          python scripts/audit_repository.py
          python scripts/validate_structure.py
          python scripts/build_readme_facts.py --check
          python scripts/build_test_dashboard.py --check
          python scripts/generate_checksums.py --check
          python scripts/build_capability_index.py --check
          python scripts/route_task.py --self-test
          python scripts/validate_figure.py examples/figure-contract.json
          python -m pytest -q -p hypothesis.extra.pytestplugin
          python -m pytest -q -p hypothesis.extra.pytestplugin -p tests.reverse_order_plugin
          TSR_TEST_ORDER_SEED=20260723 python -m pytest -q -p hypothesis.extra.pytestplugin -p tests.random_order_plugin
          python -m ruff format --check scripts tsao_researcher tests
          python -m ruff check scripts tsao_researcher tests
          python -m mypy scripts tsao_researcher
          python -m bandit -q -lll -r scripts tsao_researcher
          python scripts/run_mutation_smoke.py --json-out /tmp/mutation-results.json
          python scripts/performance_smoke.py --json-out /tmp/performance.json
          rm -rf /tmp/dist-a /tmp/dist-b
          VERSION="$(tr -d '\r\n' < VERSION)"
          python scripts/package_release.py --out /tmp/dist-a
          python scripts/package_release.py --out /tmp/dist-b
          cmp "/tmp/dist-a/TsaoSciResearcher-v${VERSION}.zip" "/tmp/dist-b/TsaoSciResearcher-v${VERSION}.zip"
          python scripts/validate_release.py
      - name: Commit verified candidate without workflow deletions
        shell: bash
        run: |
          set -euo pipefail
          for path in \
            .github/workflows/finalize-test-dashboard.yml \
            .github/workflows/finalize-test-dashboard-v2.yml \
            .github/workflows/diagnose-dashboard-ruff.yml \
            .github/workflows/fix-dashboard-source.yml \
            .github/workflows/patch-dashboard-publisher.yml \
            .github/workflows/publish-dashboard-candidate.yml; do
            if git ls-files --error-unmatch "$path" >/dev/null 2>&1; then
              git checkout HEAD -- "$path"
            fi
          done
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'docs: add verified automated-test dashboard'
          git pull --rebase origin main
          git push origin HEAD:main
