name: Diagnose current v0.5.3 static gates once

on:
  push:
    branches: [main]
    paths:
      - .github/v053-static-diagnose-trigger

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONNOUSERSITE: "1"
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

jobs:
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-ci.lock
      - name: Ruff format
        run: python -m ruff format --check scripts tsao_researcher tests
      - name: Ruff lint
        run: python -m ruff check scripts tsao_researcher tests
      - name: Strict Mypy
        run: python -m mypy scripts tsao_researcher
      - name: Bandit
        run: python -m bandit -q -lll -r scripts tsao_researcher
