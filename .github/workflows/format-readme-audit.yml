name: Format README audit sources

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - scripts/audit_repository.py
      - scripts/build_readme_facts.py
      - tests/test_readme_facts.py
      - .github/workflows/format-readme-audit.yml

permissions:
  contents: write

concurrency:
  group: format-readme-audit
  cancel-in-progress: false

jobs:
  format:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.head_ref == 'agent/readme-bilingual-audit' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout candidate branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: agent/readme-bilingual-audit
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Install exact Ruff
        run: python -m pip install --disable-pip-version-check ruff==0.15.22
      - name: Apply Ruff formatting
        run: python -m ruff format scripts/audit_repository.py scripts/build_readme_facts.py tests/test_readme_facts.py
      - name: Commit formatted Python sources
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- scripts/audit_repository.py scripts/build_readme_facts.py tests/test_readme_facts.py; then
            echo 'Ruff made no changes.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/audit_repository.py scripts/build_readme_facts.py tests/test_readme_facts.py
          git commit -m 'style: apply exact Ruff formatting to README audit sources'
          git push origin HEAD:agent/readme-bilingual-audit
