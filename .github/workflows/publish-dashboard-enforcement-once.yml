name: Publish dashboard enforcement once

on:
  push:
    branches: [main]
    paths:
      - .github/publish-dashboard-enforcement-trigger

permissions:
  contents: write

concurrency:
  group: publish-dashboard-enforcement-once
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Publish running state
        env:
          RUN_ID: ${{ github.run_id }}
          VALIDATED_COMMIT: ${{ github.sha }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          Path('.github/publish-dashboard-enforcement-status.json').write_text(
              json.dumps(
                  {
                      'status': 'RUNNING',
                      'run_id': int(os.environ['RUN_ID']),
                      'validated_commit': os.environ['VALIDATED_COMMIT'],
                  },
                  indent=2,
                  sort_keys=True,
              ) + '\n',
              encoding='utf-8',
          )
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/publish-dashboard-enforcement-status.json
          git commit -m 'ci: mark dashboard enforcement publication running'
          git push origin HEAD:main

  publish:
    needs: heartbeat
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact dependencies and package
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
          python -m pip check
      - name: Build permanent tree
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str) -> None:
              text = path.read_text(encoding='utf-8', errors='strict')
              if new in text:
                  return
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one occurrence of {old!r}, found {count}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8', newline='\n')

          audit = Path('scripts/audit_repository.py')
          replace_once(audit, '    "build_readme_facts.py",\n', '    "build_readme_facts.py",\n    "build_test_dashboard.py",\n')
          replace_once(audit, '        "docs/VALIDATION_EVIDENCE.json",\n', '        "docs/VALIDATION_EVIDENCE.json",\n        "docs/test-dashboard.html",\n        "docs/test-dashboard.svg",\n')
          replace_once(audit, '        "python -m mypy scripts tsao_researcher",\n', '        "python -m mypy scripts tsao_researcher",\n        "python scripts/build_test_dashboard.py --check",\n')

          ci = Path('.github/workflows/ci.yml')
          replace_once(ci, '          python scripts/build_readme_facts.py --check\n', '          python scripts/build_readme_facts.py --check\n          python scripts/build_test_dashboard.py --check\n')

          validation = Path('docs/VALIDATION.md')
          replace_once(validation, 'python scripts/build_readme_facts.py --check\n', 'python scripts/build_readme_facts.py --check\npython scripts/build_test_dashboard.py --check\n')

          readme = Path('README.md')
          replace_once(readme, 'python scripts/build_readme_facts.py --check\n', 'python scripts/build_readme_facts.py --check\npython scripts/build_test_dashboard.py --check\n')
          Path('README_EN.md').write_text(readme.read_text(encoding='utf-8'), encoding='utf-8', newline='\n')

          chinese = Path('README.zh-CN.md')
          replace_once(chinese, 'python scripts/build_readme_facts.py --check\n', 'python scripts/build_readme_facts.py --check\npython scripts/build_test_dashboard.py --check\n')
          PY
          rm -f .github/workflows/finalize-dashboard-ci-enforcement.yml
          rm -f .github/finalize-dashboard-ci-enforcement-trigger
          rm -f .github/workflows/publish-dashboard-enforcement-once.yml
          rm -f .github/publish-dashboard-enforcement-trigger
          rm -f .github/publish-dashboard-enforcement-status.json
          python scripts/build_test_dashboard.py --write
          python scripts/build_readme_facts.py --write
          python scripts/generate_checksums.py --write
      - name: Verify permanent tree
        run: |
          python scripts/validate_schemas.py
          python scripts/audit_repository.py
          python scripts/validate_structure.py
          python scripts/build_readme_facts.py --check
          python scripts/build_test_dashboard.py --check
          python scripts/generate_checksums.py --check
          python scripts/build_capability_index.py --check
          python scripts/route_task.py --self-test
          python scripts/validate_figure.py examples/figure-contract.json
          python -m ruff format --check scripts tsao_researcher tests
          python -m ruff check scripts tsao_researcher tests
          python -m mypy scripts tsao_researcher
          python -m bandit -q -lll -r scripts tsao_researcher
      - name: Commit permanent tree
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'ci: enforce permanent automated-test dashboard validation'
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
