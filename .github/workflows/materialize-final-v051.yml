name: Materialize verified TsaoSciResearcher v0.5.1

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

concurrency:
  group: materialize-final-v051
  cancel-in-progress: false

jobs:
  materialize:
    if: >-
      github.head_ref == 'agent/final-source-v051' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      HEAD_REF: agent/final-source-v051
      EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      REAUDIT_SHA: 777fd1ac80992dbb28a8e9bb93660c0ed37a9071
      VNEXT_SHA: e66b25e7f10bdd2ae2b18a0f5a63ce6de6ad5e7a
      PRIMARY_XZ_SHA256: b9dc97c22a4d54316303160052c22bd85088a6b7611e635f23eceecb36810063
      PRIMARY_PATCH_SHA256: 893f660a3425409ba532e17348bf6259f5f504cadc358992aa4d04cb0533d74a
      SUPPLEMENT_XZ_SHA256: 956c2e4fffbf680b2b3cec4fa9092f787597798cea3857ceef154e5c0cc5b83a
      SUPPLEMENT_PATCH_SHA256: 43197b40aebffe27d4a078d51bf3b08679035ee6f774928021c84f5431201193
      PYTHONDONTWRITEBYTECODE: '1'
      PYTHONNOUSERSITE: '1'
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
    steps:
      - name: Checkout trusted main workflow
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Check candidate state
        id: state
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune
          test "$(git rev-parse "origin/$HEAD_REF")" = "$EXPECTED_HEAD_SHA"
          version="$(git show "origin/$HEAD_REF:VERSION" 2>/dev/null || true)"
          if [ "$version" = '0.5.1' ]; then
            echo 'materialized=true' >> "$GITHUB_OUTPUT"
            echo 'candidate already contains the real v0.5.1 source tree'
          else
            echo 'materialized=false' >> "$GITHUB_OUTPUT"
          fi
      - name: Reconstruct checksum-bound source tree
        if: steps.state.outputs.materialized != 'true'
        shell: bash
        run: |
          exec > >(tee "$RUNNER_TEMP/reconstruct.log") 2>&1
          set -euxo pipefail
          git cat-file -e "$REAUDIT_SHA^{commit}"
          git cat-file -e "$VNEXT_SHA^{commit}"

          BASE="$RUNNER_TEMP/reaudit"
          VNEXT="$RUNNER_TEMP/vnext"
          PATCH_DIR="$RUNNER_TEMP/patches"
          mkdir -p "$PATCH_DIR"
          git worktree add --detach "$BASE" "$REAUDIT_SHA"
          git worktree add --detach "$VNEXT" "$VNEXT_SHA"

          git switch -C "$HEAD_REF" origin/main
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf -- {} +
          rsync -a --exclude=.git "$BASE/" ./
          rsync -a --ignore-existing --exclude=.git "$VNEXT/" ./

          : > "$PATCH_DIR/primary.b64"
          for index in $(seq -w 0 13); do
            git show "origin/main:.github/final-payload/part-$index.b64" \
              | tr -d '\r\n\t ' >> "$PATCH_DIR/primary.b64"
          done
          base64 --decode "$PATCH_DIR/primary.b64" > "$PATCH_DIR/primary.patch.xz"
          sha256sum "$PATCH_DIR/primary.patch.xz"
          echo "$PRIMARY_XZ_SHA256  $PATCH_DIR/primary.patch.xz" | sha256sum --check --strict
          xz --decompress --stdout "$PATCH_DIR/primary.patch.xz" > "$PATCH_DIR/primary.patch"
          sha256sum "$PATCH_DIR/primary.patch"
          echo "$PRIMARY_PATCH_SHA256  $PATCH_DIR/primary.patch" | sha256sum --check --strict
          git apply --check --binary "$PATCH_DIR/primary.patch"
          git apply --binary "$PATCH_DIR/primary.patch"

          : > "$PATCH_DIR/supplement.b64"
          for index in 00 01 02 03 04 05 06 07; do
            git show "origin/main:.github/final-payload/supplement-$index.b64" \
              | tr -d '\r\n\t ' >> "$PATCH_DIR/supplement.b64"
          done
          base64 --decode "$PATCH_DIR/supplement.b64" > "$PATCH_DIR/supplement.patch.xz"
          sha256sum "$PATCH_DIR/supplement.patch.xz"
          echo "$SUPPLEMENT_XZ_SHA256  $PATCH_DIR/supplement.patch.xz" | sha256sum --check --strict
          xz --decompress --stdout "$PATCH_DIR/supplement.patch.xz" > "$PATCH_DIR/supplement.patch"
          sha256sum "$PATCH_DIR/supplement.patch"
          echo "$SUPPLEMENT_PATCH_SHA256  $PATCH_DIR/supplement.patch" | sha256sum --check --strict
          git apply --check --binary "$PATCH_DIR/supplement.patch"
          git apply --binary "$PATCH_DIR/supplement.patch"

          test "$(cat VERSION)" = '0.5.1'
          test -f README.md
          test -f README.zh-CN.md
          test -f requirements-ci.lock
          test -f .github/workflows/cleanup-branches.yml
          test ! -e .github/final-payload
          test ! -e .github/final-source
          test ! -e scripts/consolidate_single_main.py
          test ! -e scripts/vnext_upgrade.py
          test ! -e scripts/vnext_finalize.py
      - name: Upload reconstruction diagnostics
        if: ${{ always() && steps.state.outputs.materialized != 'true' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: final-v051-reconstruction-diagnostics
          path: ${{ runner.temp }}/reconstruct.log
          if-no-files-found: error
          retention-days: 7
      - name: Install exact dependencies
        if: steps.state.outputs.materialized != 'true'
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
          python -m pip check
      - name: Repository, contract, and checksum audit
        if: steps.state.outputs.materialized != 'true'
        run: |
          python scripts/audit_repository.py
          python scripts/validate_structure.py
          python scripts/generate_checksums.py --check
          python scripts/build_capability_index.py --check
          python scripts/route_task.py --self-test
          python -m compileall -q scripts tsao_researcher tests
      - name: Complete deterministic regression
        if: steps.state.outputs.materialized != 'true'
        run: python -m pytest -q -p hypothesis.extra.pytestplugin
      - name: Static quality and security
        if: steps.state.outputs.materialized != 'true'
        run: |
          python -m ruff format --check scripts tsao_researcher tests
          python -m ruff check scripts tsao_researcher tests
          python -m mypy scripts tsao_researcher
          python -m bandit -q -lll -r scripts tsao_researcher
      - name: Mutation, performance, install, and reproducible release
        if: steps.state.outputs.materialized != 'true'
        shell: bash
        run: |
          set -euo pipefail
          python scripts/run_mutation_smoke.py --json-out artifacts/mutation-results.json
          python scripts/performance_smoke.py --json-out artifacts/performance.json
          python scripts/install.py --target "$RUNNER_TEMP/TsaoSciResearcher" --dry-run --validate
          rm -rf dist-a dist-b
          python scripts/package_release.py --out dist-a
          python scripts/package_release.py --out dist-b
          cmp dist-a/TsaoSciResearcher-v0.5.1.zip dist-b/TsaoSciResearcher-v0.5.1.zip
          python scripts/validate_release.py
      - name: Publish real source candidate
        if: steps.state.outputs.materialized != 'true'
        shell: bash
        run: |
          exec > >(tee "$RUNNER_TEMP/publish.log") 2>&1
          set -euxo pipefail
          rm -rf dist-a dist-b artifacts .coverage
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --stat
          git commit -m 'release: publish complete optimized TsaoSciResearcher v0.5.1 source tree'
          remote_head="$(git ls-remote --heads origin "refs/heads/$HEAD_REF" | cut -f1)"
          test "$remote_head" = "$EXPECTED_HEAD_SHA"
          git push --force origin "HEAD:refs/heads/$HEAD_REF"
      - name: Upload publish diagnostics
        if: ${{ always() && steps.state.outputs.materialized != 'true' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: final-v051-publish-diagnostics
          path: ${{ runner.temp }}/publish.log
          if-no-files-found: warn
          retention-days: 7
