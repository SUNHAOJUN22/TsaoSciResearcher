name: Finalize verified test dashboard v2 once

on:
  push:
    branches: [main]
    paths:
      - .github/finalize-test-dashboard-v2-trigger

permissions:
  contents: write

concurrency:
  group: finalize-test-dashboard-v2-once
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONNOUSERSITE: "1"
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

jobs:
  heartbeat:
    name: dashboard-v2-validation-heartbeat
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Publish running state
        env:
          RUN_ID: ${{ github.run_id }}
          VALIDATED_COMMIT: ${{ github.sha }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          Path('.github/finalize-test-dashboard-status.json').write_text(
              json.dumps({
                  'status': 'RUNNING',
                  'workflow': 'v2',
                  'run_id': int(os.environ['RUN_ID']),
                  'validated_commit': os.environ['VALIDATED_COMMIT'],
              }, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/finalize-test-dashboard-status.json
          git commit -m 'ci: mark dashboard-v2 validation running'
          git push origin HEAD:main

  compatibility:
    needs: heartbeat
    name: dashboard-v2-${{ matrix.os }}-py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact dependencies and package
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
          python -m pip check
      - name: Compile runtime and dashboard tools
        env:
          PYTHONPYCACHEPREFIX: ${{ runner.temp }}/tsr-pycache
        run: python -m compileall -q scripts tsao_researcher tests
      - name: Critical tests
        run: >-
          python -m pytest -q -p hypothesis.extra.pytestplugin
          tests/test_archive_safety.py
          tests/test_common.py
          tests/test_install.py
          tests/test_project_state.py
          tests/test_runtime_v2.py
          tests/test_handoff_cli.py
          tests/test_named_capabilities.py

  finalize:
    name: dashboard-v2-full-validation-and-materialization
    needs: compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact dependencies and package
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
          python -m pip check
      - name: Format dashboard tools
        run: |
          python -m ruff check --fix scripts/build_test_dashboard.py scripts/finalize_test_dashboard.py
          python -m ruff format scripts/build_test_dashboard.py scripts/finalize_test_dashboard.py
          python -m py_compile scripts/build_test_dashboard.py scripts/finalize_test_dashboard.py
      - name: Materialize permanent README and evidence tree
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
        run: python scripts/finalize_test_dashboard.py
      - name: Generate dashboard assets
        run: python scripts/build_test_dashboard.py --write
      - name: Generate README facts
        run: python scripts/build_readme_facts.py --write
      - name: Generate repository checksum
        run: python scripts/generate_checksums.py --write
      - name: Repository, README, dashboard and contract audit
        run: |
          python scripts/validate_schemas.py
          python scripts/audit_repository.py
          python scripts/validate_structure.py
          python scripts/build_readme_facts.py --check
          python scripts/build_test_dashboard.py --check
          python scripts/generate_checksums.py --check
          python scripts/build_capability_index.py --check
          python scripts/route_task.py --self-test
          python scripts/validate_figure.py examples/figure-contract.json
      - name: Complete regression
        run: python -m pytest -q -p hypothesis.extra.pytestplugin
      - name: Reverse-order regression
        run: python -m pytest -q -p hypothesis.extra.pytestplugin -p tests.reverse_order_plugin
      - name: Seeded random-order regression
        env:
          TSR_TEST_ORDER_SEED: "20260723"
        run: python -m pytest -q -p hypothesis.extra.pytestplugin -p tests.random_order_plugin
      - name: Static quality and security
        run: |
          python -m ruff format --check scripts tsao_researcher tests
          python -m ruff check scripts tsao_researcher tests
          python -m mypy scripts tsao_researcher
          python -m bandit -q -lll -r scripts tsao_researcher
      - name: Critical mutation gate
        run: python scripts/run_mutation_smoke.py --json-out /tmp/mutation-results.json
      - name: Performance gate
        run: python scripts/performance_smoke.py --json-out /tmp/performance.json
      - name: Byte-identical release
        shell: bash
        run: |
          rm -rf /tmp/dist-a /tmp/dist-b
          VERSION="$(tr -d '\r\n' < VERSION)"
          python scripts/package_release.py --out /tmp/dist-a
          python scripts/package_release.py --out /tmp/dist-b
          cmp "/tmp/dist-a/TsaoSciResearcher-v${VERSION}.zip" "/tmp/dist-b/TsaoSciResearcher-v${VERSION}.zip"
          python scripts/validate_release.py
      - name: Commit verified dashboard directly to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'docs: add verified automated-test dashboard'
          git push origin HEAD:main

  failure-report:
    name: dashboard-v2-failure-report
    if: ${{ always() && (needs.compatibility.result != 'success' || needs.finalize.result != 'success') }}
    needs: [heartbeat, compatibility, finalize]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Publish failure state
        env:
          COMPATIBILITY: ${{ needs.compatibility.result }}
          FINALIZE: ${{ needs.finalize.result }}
          RUN_ID: ${{ github.run_id }}
          VALIDATED_COMMIT: ${{ github.sha }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          Path('.github/finalize-test-dashboard-status.json').write_text(
              json.dumps({
                  'status': 'FAIL',
                  'workflow': 'v2',
                  'run_id': int(os.environ['RUN_ID']),
                  'validated_commit': os.environ['VALIDATED_COMMIT'],
                  'jobs': {
                      'compatibility': os.environ['COMPATIBILITY'],
                      'finalize': os.environ['FINALIZE'],
                  },
              }, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/finalize-test-dashboard-status.json
          git commit -m 'ci: report dashboard-v2 validation failure'
          git push origin HEAD:main
