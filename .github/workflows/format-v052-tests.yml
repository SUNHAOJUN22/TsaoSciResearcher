name: Format v0.5.2 regression tests

on:
  push:
    branches: [main]
    paths:
      - .github/format-v052-tests-trigger

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact Ruff
        run: python -m pip install --disable-pip-version-check -r requirements-ci.lock
      - name: Format tests and commit
        shell: bash
        run: |
          set -euo pipefail
          python -m ruff format tests/test_handoff_cli.py tests/test_named_capabilities.py
          python -m ruff check tests/test_handoff_cli.py tests/test_named_capabilities.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/test_handoff_cli.py tests/test_named_capabilities.py
          if ! git diff --cached --quiet; then
            git commit -m 'style: format v0.5.2 regression tests'
            git push origin HEAD:main
          fi
