name: Diagnose current v0.5.3 static results once

on:
  push:
    branches: [main]
    paths:
      - .github/v053-static-result-trigger

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONNOUSERSITE: "1"
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-ci.lock
      - name: Record independent static results
        shell: bash
        run: |
          set +e
          python -m ruff format --check scripts tsao_researcher tests > /tmp/format.log 2>&1; format_rc=$?
          python -m ruff check scripts tsao_researcher tests > /tmp/ruff.log 2>&1; ruff_rc=$?
          python -m mypy scripts tsao_researcher > /tmp/mypy.log 2>&1; mypy_rc=$?
          python -m bandit -q -lll -r scripts tsao_researcher > /tmp/bandit.log 2>&1; bandit_rc=$?
          set -e
          FORMAT_RC="$format_rc" RUFF_RC="$ruff_rc" MYPY_RC="$mypy_rc" BANDIT_RC="$bandit_rc" python - <<'PY'
          import json
          import os
          from pathlib import Path

          def tail(path: str) -> list[str]:
              rows = Path(path).read_text(encoding="utf-8", errors="replace").splitlines()
              return rows[-80:]

          value = {
              "run_id": int(os.environ["GITHUB_RUN_ID"]),
              "results": {
                  "ruff_format": {"exit_code": int(os.environ["FORMAT_RC"]), "log_tail": tail("/tmp/format.log")},
                  "ruff_lint": {"exit_code": int(os.environ["RUFF_RC"]), "log_tail": tail("/tmp/ruff.log")},
                  "mypy_strict": {"exit_code": int(os.environ["MYPY_RC"]), "log_tail": tail("/tmp/mypy.log")},
                  "bandit": {"exit_code": int(os.environ["BANDIT_RC"]), "log_tail": tail("/tmp/bandit.log")},
              },
          }
          Path(".github/v053-static-result.json").write_text(
              json.dumps(value, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
              newline="\n",
          )
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/v053-static-result.json
          git commit -m 'ci: record v0.5.3 static diagnostics [skip ci]'
          git push origin HEAD:main
