name: Tsao main integration audit once

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/tsao-main-integration-once.yml

permissions:
  contents: write

concurrency:
  group: tsao-main-integration-audit-once
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONNOUSERSITE: "1"
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
  STATUS_FILE: .github/tsao-v053-integration-status.json

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Configure publication identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Publish observable running status
        shell: bash
        run: |
          printf '{"status":"RUNNING","run_id":%s,"trigger_commit":"%s"}\n' "$GITHUB_RUN_ID" "$GITHUB_SHA" > "$STATUS_FILE"
          git add "$STATUS_FILE"
          git commit -m 'ci: mark v0.5.3 integration running'
          git push origin HEAD:main

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock

      - name: Install exact dependencies and package
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
          python -m pip check

      - name: Apply bounded integration patch
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import hashlib
          import zlib

          payload = ""
          source = zlib.decompress(base64.b64decode(payload))
          expected = "e7a2fb84b0c443674e9b9292e7b00211db3c1d8af41c08ea62484783f0996840"
          if hashlib.sha256(source).hexdigest() != expected:
              raise SystemExit("integration patch digest mismatch")
          exec(compile(source, "tsao-v053-integration.py", "exec"), {"__name__": "__main__"})
          PY
          rm -f "$STATUS_FILE"

      - name: Format and generate deterministic artifacts
        shell: bash
        run: |
          python -m ruff format scripts tsao_researcher tests
          python scripts/build_research_quality_dashboard.py --write
          python scripts/build_readme_facts.py --write
          python scripts/build_validation_evidence.py --write --parent-commit "$GITHUB_SHA" --run-id "$GITHUB_RUN_ID" --evidence-date 2026-07-23
          python scripts/build_test_dashboard.py --write
          python scripts/build_engineering_report.py --write
          python scripts/generate_checksums.py --write

      - name: Repository and documentation gates
        run: |
          python scripts/validate_schemas.py
          python scripts/build_validation_evidence.py --check
          python scripts/build_readme_facts.py --check
          python scripts/build_test_dashboard.py --check
          python scripts/build_research_quality_dashboard.py --check
          python scripts/build_engineering_report.py --check
          python scripts/audit_repository.py
          python scripts/validate_structure.py
          python scripts/generate_checksums.py --check
          python scripts/build_capability_index.py --check
          python scripts/route_task.py --self-test
          python scripts/validate_figure.py examples/figure-contract.json
          python -m tsao_researcher quality examples/scientific-quality-check.json

      - name: Complete isolated regression
        run: python scripts/run_tests.py --jobs 4 --json-out artifacts/test-results.json --skip-release-validation

      - name: Reverse and seeded-random regression
        run: |
          python scripts/run_tests.py --jobs 4 --order reverse --skip-preflight --skip-release-validation
          python scripts/run_tests.py --jobs 4 --order random --seed 20260723 --skip-preflight --skip-release-validation

      - name: Static quality and security
        run: |
          python -m ruff format --check scripts tsao_researcher tests
          python -m ruff check scripts tsao_researcher tests
          python -m mypy scripts tsao_researcher
          python -m bandit -q -lll -r scripts tsao_researcher

      - name: Mutation, performance and reproducible release
        run: |
          python scripts/run_mutation_smoke.py --json-out artifacts/mutation-results.json
          python scripts/performance_smoke.py --json-out artifacts/performance.json
          python scripts/validate_release.py

      - name: Rebuild final evidence and verify generated state
        run: |
          python scripts/build_research_quality_dashboard.py --write
          python scripts/build_readme_facts.py --write
          python scripts/build_validation_evidence.py --write --parent-commit "$GITHUB_SHA" --run-id "$GITHUB_RUN_ID" --evidence-date 2026-07-23
          python scripts/build_test_dashboard.py --write
          python scripts/build_engineering_report.py --write
          python scripts/generate_checksums.py --write
          python scripts/build_validation_evidence.py --check
          python scripts/build_readme_facts.py --check
          python scripts/build_test_dashboard.py --check
          python scripts/build_research_quality_dashboard.py --check
          python scripts/build_engineering_report.py --check
          python scripts/audit_repository.py
          python scripts/generate_checksums.py --check

      - name: Commit verified main tree
        shell: bash
        run: |
          git add -A
          git commit -m 'feat: integrate scientific quality guards and visual audit'
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main

      - name: Publish observable failure status
        if: failure()
        shell: bash
        run: |
          git reset --hard HEAD
          printf '{"status":"FAILED","run_id":%s,"trigger_commit":"%s"}\n' "$GITHUB_RUN_ID" "$GITHUB_SHA" > "$STATUS_FILE"
          git add "$STATUS_FILE"
          git commit -m 'ci: mark v0.5.3 integration failed' || true
          git fetch origin main
          git rebase origin/main || true
          git push origin HEAD:main || true
