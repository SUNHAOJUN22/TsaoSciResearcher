name: Tsao main integration audit once

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/tsao-main-integration-once.yml

permissions:
  contents: write

concurrency:
  group: tsao-main-integration-audit-once
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONNOUSERSITE: "1"
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock

      - name: Install exact dependencies and package
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
          python -m pip check

      - name: Apply bounded main upgrade
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations
          
          import base64
          import json
          from pathlib import Path
          
          FILES = {'tsao_researcher/scientific_quality.py': '', 'tests/test_scientific_quality.py': '', 'scripts/build_research_quality_dashboard.py': '', 'scripts/build_engineering_report.py': '...60111 chars truncated...          english = english.replace("**Release 0.5.2**", "**Release 0.5.3**")
          needle = "- **Evidence and claim controls** — schema validation, bidirectional links, citation checks and non-zero failure exits.\n"
          addition = needle + "- **Executable scientific-quality guards** — measurement boundaries, structure–property mediation and causal-overclaim checks with stable `PASS`/`WARN`/`BLOCK` findings.\n"
          if "Executable scientific-quality guards" not in english:
              if english.count(needle) != 1:
                  raise SystemExit("README.md evidence-controls insertion point changed")
              english = english.replace(needle, addition, 1)
          search_block = """### Search named capabilities
          
          ```bash
          python -m tsao_researcher search "gromacs trajectory analysis" --limit 10
          python -m tsao_researcher search "non-newtonian flow" --domain cfd-particles-processing
          ```
          """
          quality_block = search_block + """
          ### Run a scientific-quality guard
          
          ```bash
          python -m tsao_researcher quality examples/scientific-quality-check.json
          ```
          
          The JSON result reports a bounded `PASS`, `WARN` or `BLOCK` decision. The guard never upgrades observational evidence into a causal conclusion.
          """
          if "### Run a scientific-quality guard" not in english:
              if english.count(search_block) != 1:
                  raise SystemExit("README.md search block changed")
              english = english.replace(search_block, quality_block, 1)
          english = english.replace(
              "python scripts/build_test_dashboard.py --check\n",
              "python scripts/build_test_dashboard.py --check\n"
              "python scripts/build_validation_evidence.py --check\n"
              "python scripts/build_research_quality_dashboard.py --check\n"
              "python scripts/build_engineering_report.py --check\n",
              1,
          )
          old_dashboard = """## Test dashboard
          
          ![Automated test dashboard](docs/test-dashboard.svg)
          
          - [Open the interactive HTML dashboard](docs/test-dashboard.html)
          - [Read the machine-readable validation evidence](docs/VALIDATION_EVIDENCE.json)
          
          The dashboard is generated from recorded validation evidence and checked in CI. It visualizes software gates; it does not replace scientific review or human approval.
          """
          new_dashboard = """## Test and research-quality visualizations
          
          ![Automated test dashboard](docs/test-dashboard.svg)
          
          - [Open the interactive test dashboard](docs/test-dashboard.html)
          - [Open the scientific-quality guard dashboard](docs/research-quality-dashboard.html)
          - [View the static scientific-quality dashboard](docs/research-quality-dashboard.svg)
          - [Download the four-page visual engineering audit](docs/engineering-audit-report.pdf)
          - [Read the scientific-quality guard specification](docs/SCIENTIFIC_QUALITY.md)
          - [Read the machine-readable validation evidence](docs/VALIDATION_EVIDENCE.json)
          
          All visual artifacts are deterministic and checked in CI. The validation evidence uses a source-tree digest that excludes evidence-derived outputs, avoiding a false self-validation claim. These software views do not replace scientific review or human approval.
          """
          if old_dashboard not in english:
              raise SystemExit("README.md dashboard section changed")
          english = english.replace(old_dashboard, new_dashboard, 1)
          Path("README.md").write_text(english, encoding="utf-8", newline="\n")
          Path("README_EN.md").write_text(english, encoding="utf-8", newline="\n")
          
          chinese = Path("README.zh-CN.md").read_text(encoding="utf-8")
          chinese = chinese.replace("**正式版本 0.5.2**", "**正式版本 0.5.3**")
          needle = "- **证据与论断检查**：Schema、双向关联、引用完整性及失败非零退出码。\n"
          addition = needle + "- **可执行科研质量门禁**：检查测量边界、结构—中介—性能链条及因果过度表述，输出稳定的 `PASS`/`WARN`/`BLOCK`。\n"
          if "可执行科研质量门禁" not in chinese:
              if chinese.count(needle) != 1:
                  raise SystemExit("README.zh-CN.md insertion point changed")
              chinese = chinese.replace(needle, addition, 1)
          search_block = """### 搜索具名能力
          
          ```bash
          python -m tsao_researcher search "GROMACS 轨迹分析" --limit 10
          python -m tsao_researcher search "非牛顿流" --domain cfd-particles-processing
          ```
          """
          quality_block = search_block + """
          ### 运行科研质量门禁
          
          ```bash
          python -m tsao_researcher quality examples/scientific-quality-check.json
          ```
          
          JSON 结果给出有边界的 `PASS`、`WARN` 或 `BLOCK`。观察性证据不会被自动升级为因果结论。
          """
          if "### 运行科研质量门禁" not in chinese:
              if chinese.count(search_block) != 1:
                  raise SystemExit("README.zh-CN.md search block changed")
              chinese = chinese.replace(search_block, quality_block, 1)
          chinese = chinese.replace(
              "python scripts/build_test_dashboard.py --check\n",
              "python scripts/build_test_dashboard.py --check\n"
              "python scripts/build_validation_evidence.py --check\n"
              "python scripts/build_research_quality_dashboard.py --check\n"
              "python scripts/build_engineering_report.py --check\n",
              1,
          )
          old_dashboard = """## 测试可视化
          
          ![自动测试仪表板](docs/test-dashboard.svg)
          
          - [打开可交互 HTML 仪表板](docs/test-dashboard.html)
          - [查看机器可读验证证据](docs/VALIDATION_EVIDENCE.json)
          
          仪表板由已记录的验证证据自动生成并由 CI 校验。它展示软件门禁结果,不替代科学结论或人工审批。
          """
          new_dashboard = """## 测试与科研质量可视化
          
          ![自动测试仪表板](docs/test-dashboard.svg)
          
          - [打开可交互测试仪表板](docs/test-dashboard.html)
          - [打开科研质量门禁仪表板](docs/research-quality-dashboard.html)
          - [查看科研质量静态图](docs/research-quality-dashboard.svg)
          - [下载四页图像化工程审计报告](docs/engineering-audit-report.pdf)
          - [阅读科研质量门禁说明](docs/SCIENTIFIC_QUALITY.md)
          - [查看机器可读验证证据](docs/VALIDATION_EVIDENCE.json)
          
          所有可视化产物均由脚本确定性生成并由 CI 校验。验证证据采用排除证据衍生产物的源码树摘要，避免“文件自证自身”的伪闭环。软件门禁不替代科学结论或人工审批。
          """
          if old_dashboard not in chinese:
              raise SystemExit("README.zh-CN.md dashboard section changed")
          chinese = chinese.replace(old_dashboard, new_dashboard, 1)
          Path("README.zh-CN.md").write_text(chinese, encoding="utf-8", newline="\n")
          
          validation = Path("docs/VALIDATION.md").read_text(encoding="utf-8")
          validation = validation.replace(
              "python scripts/build_test_dashboard.py --check\n",
              "python scripts/build_test_dashboard.py --check\n"
              "python scripts/build_validation_evidence.py --check\n"
              "python scripts/build_research_quality_dashboard.py --check\n"
              "python scripts/build_engineering_report.py --check\n",
              1,
          )
          validation = validation.replace(
              "5. state, evidence, claim, figure and computation-handoff contracts;\n",
              "5. state, evidence, claim, figure, scientific-quality and computation-handoff contracts;\n",
              1,
          )
          validation = validation.replace(
              "The latest dated results are recorded in [`VALIDATION_EVIDENCE.json`](VALIDATION_EVIDENCE.json).",
              "The latest dated results are recorded in [`VALIDATION_EVIDENCE.json`](VALIDATION_EVIDENCE.json). The file records a non-self-referential source-tree digest; evidence-derived dashboards, the PDF and the aggregate checksum are excluded from that digest and are verified separately.",
              1,
          )
          Path("docs/VALIDATION.md").write_text(validation, encoding="utf-8", newline="\n")
          
          append_once(
              "docs/ARCHITECTURE.md",
              "## Executable scientific quality layer",
              """## Executable scientific quality layer
          
          `tsao_researcher.scientific_quality` is a deterministic guard layer between scientific reasoning and publication wording. It checks operational measurement boundaries, forces a structure -> mediator -> property chain, and blocks causal wording that exceeds the declared design. The layer is host-independent and returns machine-readable findings; it does not replace evidence review.
          
          The HTML/SVG dashboard and four-page PDF audit are generated from machine-readable evidence and guard examples. A source-tree digest excludes evidence-derived outputs so the repository does not claim that a file validates its own bytes.""",
          )
          
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          entry = """## 0.5.3 - 2026-07-23
          
          - Add executable Measurement Boundary, Structure-Property Planner and Causality Guard checks with a JSON CLI and unit tests.
          - Add deterministic HTML/SVG research-quality dashboards and a reproducible four-page PDF engineering audit report.
          - Replace simulated permanent-tree wording with a non-self-referential source-tree digest and explicit provenance boundaries.
          - Extend repository audit, local preflight, README consistency and CI to enforce the new guards and generated reports.
          
          """
          if "## 0.5.3 - 2026-07-23" not in changelog:
              changelog = changelog.replace("# Changelog\n\n", "# Changelog\n\n" + entry, 1)
          Path("CHANGELOG.md").write_text(changelog, encoding="utf-8", newline="\n")
          
          Path(".github/workflows/tsao-main-integration-once.yml").unlink()
          PY

      - name: Format and generate deterministic artifacts
        shell: bash
        run: |
          python -m ruff format scripts tsao_researcher tests
          python scripts/build_research_quality_dashboard.py --write
          python scripts/build_readme_facts.py --write
          python scripts/build_validation_evidence.py --write --parent-commit "$GITHUB_SHA" --run-id "$GITHUB_RUN_ID" --evidence-date 2026-07-23
          python scripts/build_test_dashboard.py --write
          python scripts/build_engineering_report.py --write
          python scripts/generate_checksums.py --write

      - name: Repository and documentation gates
        run: |
          python scripts/validate_schemas.py
          python scripts/build_validation_evidence.py --check
          python scripts/build_readme_facts.py --check
          python scripts/build_test_dashboard.py --check
          python scripts/build_research_quality_dashboard.py --check
          python scripts/build_engineering_report.py --check
          python scripts/audit_repository.py
          python scripts/validate_structure.py
          python scripts/generate_checksums.py --check
          python scripts/build_capability_index.py --check
          python scripts/route_task.py --self-test
          python scripts/validate_figure.py examples/figure-contract.json
          python -m tsao_researcher quality examples/scientific-quality-check.json

      - name: Complete regression
        run: python -m pytest -q -p hypothesis.extra.pytestplugin --junitxml=artifacts/junit.xml

      - name: Reverse and seeded-random regression
        env:
          TSR_TEST_ORDER_SEED: "20260723"
        run: |
          python -m pytest -q -p hypothesis.extra.pytestplugin -p tests.reverse_order_plugin
          python -m pytest -q -p hypothesis.extra.pytestplugin -p tests.random_order_plugin

      - name: Static quality and security
        run: |
          python -m ruff format --check scripts tsao_researcher tests
          python -m ruff check scripts tsao_researcher tests
          python -m mypy scripts tsao_researcher
          python -m bandit -q -lll -r scripts tsao_researcher

      - name: Mutation, performance and reproducible release
        shell: bash
        run: |
          python scripts/run_mutation_smoke.py --json-out artifacts/mutation-results.json
          python scripts/performance_smoke.py --json-out artifacts/performance.json
          rm -rf /tmp/dist-a /tmp/dist-b
          python scripts/package_release.py --out /tmp/dist-a
          python scripts/package_release.py --out /tmp/dist-b
          VERSION="$(tr -d '\r\n' < VERSION)"
          cmp "/tmp/dist-a/TsaoSciResearcher-v${VERSION}.zip" "/tmp/dist-b/TsaoSciResearcher-v${VERSION}.zip"
          python scripts/validate_release.py

      - name: Rebuild final evidence and verify clean generated state
        shell: bash
        run: |
          python scripts/build_research_quality_dashboard.py --write
          python scripts/build_readme_facts.py --write
          python scripts/build_validation_evidence.py --write --parent-commit "$GITHUB_SHA" --run-id "$GITHUB_RUN_ID" --evidence-date 2026-07-23
          python scripts/build_test_dashboard.py --write
          python scripts/build_engineering_report.py --write
          python scripts/generate_checksums.py --write
          python scripts/build_validation_evidence.py --check
          python scripts/build_readme_facts.py --check
          python scripts/build_test_dashboard.py --check
          python scripts/build_research_quality_dashboard.py --check
          python scripts/build_engineering_report.py --check
          python scripts/audit_repository.py
          python scripts/generate_checksums.py --check

      - name: Commit verified main tree
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No changes to publish.'
            exit 0
          fi
          git commit -m 'feat: integrate scientific quality guards and visual audit'
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
