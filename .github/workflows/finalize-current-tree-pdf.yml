name: Finalize current-tree PDF wording once

on:
  push:
    branches: [main]
    paths:
      - .github/finalize-current-tree-pdf.trigger

permissions:
  contents: write

concurrency:
  group: finalize-current-tree-pdf
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONNOUSERSITE: "1"
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
  STATUS_FILE: .github/finalize-current-tree-pdf.status.json

jobs:
  finalize:
    name: correct-report-regenerate-and-validate
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout current main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Publish observable running state
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          Path(os.environ["STATUS_FILE"]).write_text(
              json.dumps(
                  {
                      "status": "RUNNING",
                      "run_id": int(os.environ["GITHUB_RUN_ID"]),
                      "trigger_commit": os.environ["GITHUB_SHA"],
                  },
                  indent=2,
                  sort_keys=True,
              ) + "\n",
              encoding="utf-8",
              newline="\n",
          )
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$STATUS_FILE"
          git commit -m 'ci: mark current-tree PDF finalization running [skip ci]'
          git push origin HEAD:main

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock

      - name: Install exact dependencies and package
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
          python -m pip check

      - name: Apply bounded report and README corrections
        shell: bash
        run: |
          rm -f .github/workflows/finalize-current-tree-pdf.yml
          rm -f .github/finalize-current-tree-pdf.trigger "$STATUS_FILE"
          python - <<'PY'
          from pathlib import Path

          report = Path("scripts/build_engineering_report.py")
          text = report.read_text(encoding="utf-8")

          page_two = '''def _page_two(evidence: dict[str, Any]) -> str:
              scope = str(evidence.get("validation_scope", "unknown"))
              current_tree = scope == "current-tree"
              title = "Current-tree software validation matrix" if current_tree else "Scoped software validation matrix"
              content = _text(46, 790, title, 22, True)
              platforms = evidence.get("compatibility", {})
              gates = evidence.get("gates", {})
              if current_tree:
                  content += _text(46, 760, "Current-tree cross-platform validation", 14, True)
                  content += _text(
                      46,
                      742,
                      "The current full integration run passed the declared repository and engineering gates.",
                      8,
                  )
              else:
                  content += _text(46, 760, "Recorded cross-platform baseline", 14, True)
                  content += _text(
                      46, 742, "These platform results are a recorded baseline, not a fresh current-tree run.", 8
                  )
              y = 710
              for label, value in sorted(platforms.items()):
                  content += _text(56, y, label.replace("_", " "), 9)
                  ratio, shown = _status_ratio(value)
                  content += _bar(330, y - 7, 150, ratio)
                  content += _text(492, y, shown, 9, True)
                  y -= 26
              gate_heading = "Current-tree validation gates" if current_tree else "Scoped validation gates"
              content += _text(46, y - 5, gate_heading, 14, True)
              y -= 37
              for label, value in gates.items():
                  if y < 95:
                      break
                  content += _text(56, y, label.replace("_", " ")[:39], 8)
                  ratio, shown = _status_ratio(value)
                  shade = 0.55 if shown == "NOT RUN" else 0.30
                  content += _bar(330, y - 7, 150, ratio, shade)
                  content += _text(492, y, shown[:16], 8, True)
                  y -= 22
              footer = (
                  "Current-tree PASS records end-to-end repository validation; scientific acceptance remains separate."
                  if current_tree
                  else "Scoped PASS applies only to the evidence levels explicitly recorded above."
              )
              content += _text(46, 68, footer, 9, True)
              return content


          '''
          start = text.index("def _page_two(")
          end = text.index("def _guard_card", start)
          text = text[:start] + page_two + text[end:]

          page_four = '''def _page_four_current_tree(evidence: dict[str, Any]) -> str:
              content = _text(46, 790, "Current-tree validation and reproducibility", 22, True)
              provenance = evidence.get("provenance", {})
              gates = evidence.get("gates", {})
              content += _rect(46, 650, 500, 92, 0.98)
              content += _text(64, 712, "Current-tree full integration", 14, True)
              content += _text(64, 687, f"GitHub Actions run: {provenance.get('workflow_run_id', 'not recorded')}", 9)
              content += _text(
                  64, 668, "Repository, regression, static, mutation, performance and release gates passed.", 8
              )
              content += _rect(46, 525, 500, 92, 0.98)
              content += _text(64, 587, "Validated source tree", 14, True)
              digest = str(provenance.get("validated_tree_sha256", "not recorded"))
              content += _text(64, 562, f"SHA-256: {digest[:64]}", 7)
              content += _text(64, 543, f"Validated files: {provenance.get('validated_file_count', 'not recorded')}", 8)
              content += _rect(46, 400, 500, 92, 0.98)
              content += _text(64, 462, "Permanent generated artifacts", 14, True)
              content += _text(64, 437, "Test dashboard, scientific-quality dashboard, PDF and checksum: PASS", 8)
              content += _text(64, 418, f"Critical mutations killed: {gates.get('critical_mutation_killed', 'not recorded')}", 8)
              content += _text(46, 352, "Reproduction entry points", 14, True)
              command_y = 325.0
              for command in [
                  "python scripts/audit_repository.py",
                  "python -m pytest -q -p hypothesis.extra.pytestplugin",
                  "python scripts/build_test_dashboard.py --check",
                  "python scripts/build_research_quality_dashboard.py --check",
                  "python scripts/build_engineering_report.py --check",
                  "python scripts/generate_checksums.py --check",
              ]:
                  wrapped, command_y = _wrapped(60, command_y, command, width=88, size=8, leading=12, max_lines=2)
                  content += wrapped
                  command_y -= 8
              content += _text(46, 150, "Scientific boundary", 14, True)
              content += _text(
                  60, 122, "Software PASS validates the declared repository controls and source-tree digest.", 8
              )
              content += _text(
                  60, 102, "It does not certify external experiments, calculations, legal conclusions or safety decisions.", 8
              )
              content += _text(
                  46, 48, "All changes were published directly to main; no branch and no pull request were created.", 8, True
              )
              return content


          def _page_four_scoped(evidence: dict[str, Any]) -> str:
              content = _text(46, 790, "Scoped evidence and limitations", 22, True)
              gates = evidence.get("gates", {})
              content += _rect(46, 650, 500, 92, 0.98)
              content += _text(64, 712, "Recorded validation scope", 14, True)
              content += _text(64, 687, f"Scope: {evidence.get('validation_scope', 'unknown')}", 9)
              content += _text(64, 668, "Only the explicitly recorded checks may be interpreted as passing.", 8)
              content += _rect(46, 525, 500, 92, 0.98)
              content += _text(64, 587, "Current-tree end-to-end CI", 14, True)
              content += _text(64, 562, f"Status: {gates.get('current_end_to_end_ci', 'not recorded')}", 9)
              content += _text(64, 543, "No current source-tree digest is asserted unless provenance records it.", 8)
              content += _text(46, 470, "Explicit limitations", 14, True)
              y = 442.0
              limitations = evidence.get("limitations", [])
              if isinstance(limitations, list):
                  for index, item in enumerate(limitations[:5], 1):
                      wrapped, y = _wrapped(60, y, f"{index}. {item!s}", width=82, size=8, leading=12, max_lines=2)
                      content += wrapped
                      y -= 10
              content += _text(46, 155, "Reproduction entry points", 14, True)
              command_y = 128.0
              for command in [
                  "python scripts/build_validation_evidence.py --check",
                  "python scripts/build_test_dashboard.py --check",
                  "python scripts/build_research_quality_dashboard.py --check",
                  "python scripts/build_engineering_report.py --check",
              ]:
                  wrapped, command_y = _wrapped(60, command_y, command, width=88, size=7, leading=10, max_lines=2)
                  content += wrapped
                  command_y -= 6
              content += _text(
                  46,
                  42,
                  "Software validation is not acceptance of experiments, external calculations, legal or safety claims.",
                  8,
                  True,
              )
              return content


          def _page_four(evidence: dict[str, Any]) -> str:
              if evidence.get("validation_scope") == "current-tree":
                  return _page_four_current_tree(evidence)
              return _page_four_scoped(evidence)


          '''
          start = text.index("def _page_four(")
          end = text.index("def _pdf", start)
          text = text[:start] + page_four + text[end:]
          report.write_text(text, encoding="utf-8", newline="\n")

          tests = Path("tests/test_visual_report_contract.py")
          test_text = tests.read_text(encoding="utf-8")
          test_case = '''

          def test_current_tree_report_uses_current_tree_wording() -> None:
              expected = build_engineering_report.build()
              assert b"Current-tree full integration" in expected
              assert b"Validated source tree" in expected
              assert b"current end-to-end CI remains NOT RUN" not in expected
              assert b"not a fresh current-tree run" not in expected
          '''
          if "test_current_tree_report_uses_current_tree_wording" not in test_text:
              test_text += test_case
          tests.write_text(test_text, encoding="utf-8", newline="\n")

          english_sentence = (
              "The dashboards are deterministic generated artifacts. They visualize software and research-method "
              "gates; they do not replace scientific review or prove external execution.\n"
          )
          english_addition = (
              english_sentence
              + "The engineering audit PDF is generated from the same current-tree validation evidence and checked "
              "byte-for-byte in CI.\n"
          )
          for name in ("README.md", "README_EN.md"):
              path = Path(name)
              readme = path.read_text(encoding="utf-8")
              if "checked byte-for-byte in CI" not in readme:
                  if english_sentence not in readme:
                      raise SystemExit(f"README anchor missing: {name}")
                  readme = readme.replace(english_sentence, english_addition, 1)
              path.write_text(readme, encoding="utf-8", newline="\n")

          chinese_sentence = (
              "仪表板是确定性生成产物，用于展示软件门禁和科研方法约束；它们不能代替科学审查，也不能证明外部任务已经执行。\n"
          )
          chinese_addition = (
              chinese_sentence
              + "工程审计 PDF 与当前树验证证据同源生成，并由 CI 进行逐字节一致性检查。\n"
          )
          path = Path("README.zh-CN.md")
          readme = path.read_text(encoding="utf-8")
          if "工程审计 PDF 与当前树验证证据同源生成" not in readme:
              if chinese_sentence not in readme:
                  raise SystemExit("Chinese README anchor missing")
              readme = readme.replace(chinese_sentence, chinese_addition, 1)
          path.write_text(readme, encoding="utf-8", newline="\n")
          PY
          python -m ruff format scripts/build_engineering_report.py tests/test_visual_report_contract.py

      - name: Regenerate current-tree evidence and visual artifacts
        shell: bash
        run: |
          python scripts/build_research_quality_dashboard.py --write
          python scripts/build_readme_facts.py --write
          python scripts/build_validation_evidence.py --write \
            --parent-commit "$GITHUB_SHA" \
            --run-id "$GITHUB_RUN_ID" \
            --evidence-date "2026-07-24"
          python scripts/build_test_dashboard.py --write
          python scripts/build_engineering_report.py --write
          python scripts/generate_checksums.py --write

      - name: Repository, documentation and artifact gates
        run: |
          python scripts/validate_schemas.py
          python scripts/audit_repository.py
          python scripts/validate_structure.py
          python scripts/build_readme_facts.py --check
          python scripts/build_validation_evidence.py --check
          python scripts/build_test_dashboard.py --check
          python scripts/build_research_quality_dashboard.py --check
          python scripts/build_engineering_report.py --check
          python scripts/generate_checksums.py --check
          python scripts/build_capability_index.py --check
          python scripts/route_task.py --self-test
          python scripts/validate_figure.py examples/figure-contract.json
          python -m tsao_researcher quality examples/scientific-quality-check.json

      - name: Full and order-independent regression
        shell: bash
        run: |
          python -m pytest -q -p hypothesis.extra.pytestplugin --junitxml=artifacts/junit.xml
          python -m pytest -q -p hypothesis.extra.pytestplugin -p tests.reverse_order_plugin
          TSR_TEST_ORDER_SEED=20260724 python -m pytest -q -p hypothesis.extra.pytestplugin -p tests.random_order_plugin

      - name: Static quality, security, mutation and performance
        run: |
          python -m ruff format --check scripts tsao_researcher tests
          python -m ruff check scripts tsao_researcher tests
          python -m mypy scripts tsao_researcher
          python -m bandit -q -lll -r scripts tsao_researcher
          python scripts/run_mutation_smoke.py --json-out artifacts/mutation-results.json
          python scripts/performance_smoke.py --json-out artifacts/performance.json

      - name: Reproducible release
        shell: bash
        run: |
          rm -rf dist-a dist-b
          VERSION="$(tr -d '\r\n' < VERSION)"
          python scripts/package_release.py --out dist-a
          python scripts/package_release.py --out dist-b
          cmp "dist-a/TsaoSciResearcher-v${VERSION}.zip" "dist-b/TsaoSciResearcher-v${VERSION}.zip"
          python scripts/validate_release.py

      - name: Upload final audit artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tsao-current-tree-pdf-${{ github.run_id }}
          path: |
            docs/VALIDATION_EVIDENCE.json
            docs/test-dashboard.html
            docs/test-dashboard.svg
            docs/research-quality-dashboard.html
            docs/research-quality-dashboard.svg
            docs/SCIENTIFIC_QUALITY_EXAMPLES.json
            docs/engineering-audit-report.pdf
            SHA256SUMS
            artifacts
          if-no-files-found: error
          retention-days: 14

      - name: Publish verified tree atomically to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          git add -A
          python - <<'PY'
          import base64
          import json
          import os
          import stat
          import subprocess
          import time
          import urllib.error
          import urllib.request
          from pathlib import Path

          repository = os.environ["REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          api_base = f"https://api.github.com/repos/{repository}"
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "TsaoSciResearcher-current-tree-pdf-finalizer",
          }

          def request(method: str, path: str, payload: dict | None = None) -> dict:
              body = None if payload is None else json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(api_base + path, data=body, headers=headers, method=method)
              with urllib.request.urlopen(req, timeout=60) as response:
                  raw = response.read()
              return json.loads(raw) if raw else {}

          raw_names = subprocess.check_output(["git", "diff", "--cached", "--name-only", "-z", "HEAD"])
          paths = [item.decode("utf-8") for item in raw_names.split(b"\0") if item]
          if not paths:
              raise SystemExit("no verified changes to publish")
          entries = []
          for relative in paths:
              path = Path(relative)
              if not path.exists():
                  entries.append({"path": relative, "mode": "100644", "type": "blob", "sha": None})
                  continue
              if path.is_symlink():
                  raise SystemExit(f"symbolic link is forbidden: {relative}")
              blob = request(
                  "POST",
                  "/git/blobs",
                  {"content": base64.b64encode(path.read_bytes()).decode("ascii"), "encoding": "base64"},
              )
              mode = "100755" if path.stat().st_mode & stat.S_IXUSR else "100644"
              entries.append({"path": relative, "mode": mode, "type": "blob", "sha": blob["sha"]})
          for attempt in range(1, 6):
              try:
                  ref = request("GET", "/git/ref/heads/main")
                  parent = ref["object"]["sha"]
                  parent_commit = request("GET", f"/git/commits/{parent}")
                  tree = request("POST", "/git/trees", {"base_tree": parent_commit["tree"]["sha"], "tree": entries})
                  commit = request(
                      "POST",
                      "/git/commits",
                      {
                          "message": "fix: align current-tree PDF and README evidence wording",
                          "tree": tree["sha"],
                          "parents": [parent],
                      },
                  )
                  request("PATCH", "/git/refs/heads/main", {"sha": commit["sha"], "force": False})
                  print(f"published verified commit {commit['sha']}")
                  break
              except urllib.error.HTTPError as exc:
                  if exc.code not in {409, 422} or attempt == 5:
                      raise
                  time.sleep(attempt * 2)
          PY
