name: Finalize current v0.5.3 evidence once

on:
  push:
    branches: [main]
    paths:
      - .github/v053-finalize-trigger

permissions:
  contents: write

concurrency:
  group: finalize-current-v053
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONNOUSERSITE: "1"
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
  STATUS_FILE: .github/v053-finalize-status.json

jobs:
  finalize:
    name: regenerate-evidence-visuals-and-run-all-gates
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout current main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Publish observable running state
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          path = Path(os.environ["STATUS_FILE"])
          path.write_text(
              json.dumps(
                  {
                      "status": "RUNNING",
                      "release": "0.5.3",
                      "run_id": int(os.environ["GITHUB_RUN_ID"]),
                      "trigger_commit": os.environ["GITHUB_SHA"],
                  },
                  indent=2,
                  sort_keys=True,
              ) + "\n",
              encoding="utf-8",
              newline="\n",
          )
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$STATUS_FILE"
          git commit -m 'ci: mark v0.5.3 finalization running [skip ci]'
          git push origin HEAD:main

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock

      - name: Install exact dependencies and package
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
          python -m pip check

      - name: Remove one-shot and historical temporary controls
        shell: bash
        run: |
          rm -f .github/workflows/finalize-v053-current.yml
          rm -f .github/v053-finalize-trigger "$STATUS_FILE"
          rm -f .github/workflows/tsao-main-integration-once.yml
          rm -f .github/tsao-v053-integration-status.json
          rm -f .github/workflows/finalize-test-dashboard.yml
          rm -f .github/workflows/finalize-test-dashboard-v2.yml
          rm -f .github/finalize-test-dashboard-trigger
          rm -f .github/finalize-test-dashboard-v2-trigger
          rm -f .github/finalize-test-dashboard-status.json
          rm -f .github/workflows/dashboard-ruff-diagnose.yml
          rm -f .github/dashboard-ruff-diagnose-trigger
          rm -f .github/dashboard-ruff-diagnostics.txt
          rm -f .github/workflows/fix-dashboard-sources.yml
          rm -f .github/dashboard-source-fix-trigger
          rm -f scripts/finalize_test_dashboard.py

      - name: Format source
        run: python -m ruff format scripts tsao_researcher tests

      - name: Generate permanent facts and visual reports
        shell: bash
        run: |
          python scripts/build_research_quality_dashboard.py --write
          python scripts/build_readme_facts.py --write
          python scripts/build_validation_evidence.py --write \
            --parent-commit "$GITHUB_SHA" \
            --run-id "$GITHUB_RUN_ID" \
            --evidence-date "2026-07-23"
          python scripts/build_test_dashboard.py --write
          python scripts/build_engineering_report.py --write
          python scripts/generate_checksums.py --write

      - name: Validate JSON Schemas
        run: python scripts/validate_schemas.py
      - name: Audit repository and contracts
        run: python scripts/audit_repository.py
      - name: Validate repository structure
        run: python scripts/validate_structure.py
      - name: Check README facts
        run: python scripts/build_readme_facts.py --check
      - name: Check validation evidence
        run: python scripts/build_validation_evidence.py --check
      - name: Check automated-test dashboard
        run: python scripts/build_test_dashboard.py --check
      - name: Check scientific-quality dashboard
        run: python scripts/build_research_quality_dashboard.py --check
      - name: Check engineering PDF report
        run: python scripts/build_engineering_report.py --check
      - name: Check repository checksum
        run: python scripts/generate_checksums.py --check
      - name: Check capability index
        run: python scripts/build_capability_index.py --check
      - name: Run routing self-test
        run: python scripts/route_task.py --self-test
      - name: Validate Figure Contract
        run: python scripts/validate_figure.py examples/figure-contract.json
      - name: Validate scientific-quality example
        run: python -m tsao_researcher quality examples/scientific-quality-check.json

      - name: Full and order-independent regression
        shell: bash
        run: |
          python -m pytest -q -p hypothesis.extra.pytestplugin --junitxml=artifacts/junit.xml
          python -m pytest -q -p hypothesis.extra.pytestplugin -p tests.reverse_order_plugin
          TSR_TEST_ORDER_SEED=20260723 python -m pytest -q -p hypothesis.extra.pytestplugin -p tests.random_order_plugin

      - name: Static quality and security
        run: |
          python -m ruff format --check scripts tsao_researcher tests
          python -m ruff check scripts tsao_researcher tests
          python -m mypy scripts tsao_researcher
          python -m bandit -q -lll -r scripts tsao_researcher

      - name: Mutation, performance and reproducible release
        shell: bash
        run: |
          python scripts/run_mutation_smoke.py --json-out artifacts/mutation-results.json
          python scripts/performance_smoke.py --json-out artifacts/performance.json
          rm -rf dist-a dist-b
          python scripts/package_release.py --out dist-a
          python scripts/package_release.py --out dist-b
          cmp dist-a/TsaoSciResearcher-v0.5.3.zip dist-b/TsaoSciResearcher-v0.5.3.zip
          python scripts/validate_release.py

      - name: Publish verified permanent tree directly to main
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore: finalize v0.5.3 evidence and visual reports'
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git fetch origin main
            git rebase origin/main
            sleep $((attempt * 2))
          done
          exit 1
