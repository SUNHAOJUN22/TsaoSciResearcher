name: Diagnose v0.6.0 reconstruction

on:
  push:
    branches: [main]
    paths:
      - .github/v060-diagnose.trigger

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: main
          fetch-depth: 0
      - name: Diagnose canonical transport manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          python - <<'PY'
          import base64, hashlib, json, os, urllib.error, urllib.request
          from pathlib import Path

          manifest = json.loads(Path('.github/v060-clean-transport.json').read_text(encoding='utf-8'))
          shas = manifest['blob_shas']
          expected = manifest['payload_sha256']
          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'TsaoSciResearcher-v060-canonical-diagnostic',
          }
          parts = []
          missing = []
          invalid = []
          for index, sha in enumerate(shas):
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/git/blobs/{sha}",
                  headers=headers,
              )
              try:
                  with urllib.request.urlopen(req, timeout=60) as response:
                      payload = json.load(response)
              except urllib.error.HTTPError as exc:
                  missing.append({'index': index, 'sha': sha, 'http_status': exc.code})
                  parts.append(None)
                  continue
              except Exception as exc:
                  missing.append({'index': index, 'sha': sha, 'error': repr(exc)})
                  parts.append(None)
                  continue
              if payload.get('sha') != sha or payload.get('encoding') != 'base64':
                  invalid.append({'index': index, 'sha': sha, 'payload_sha': payload.get('sha'), 'encoding': payload.get('encoding')})
                  parts.append(None)
                  continue
              try:
                  compact = ''.join(payload['content'].split())
                  parts.append(base64.b64decode(compact, validate=True).decode('ascii'))
              except Exception as exc:
                  invalid.append({'index': index, 'sha': sha, 'decode_error': repr(exc)})
                  parts.append(None)

          actual = None
          archive_bytes = None
          digest_matches = False
          reconstruction_error = None
          if not missing and not invalid:
              try:
                  encoded = ''.join(parts).replace('\r', '').replace('\n', '')
                  archive = base64.b64decode(encoded, validate=True)
                  archive_bytes = len(archive)
                  actual = hashlib.sha256(archive).hexdigest()
                  digest_matches = actual == expected
              except Exception as exc:
                  reconstruction_error = repr(exc)

          status = 'PASS' if not missing and not invalid and digest_matches else 'FAIL'
          result = {
              'status': status,
              'run_id': int(os.environ['GITHUB_RUN_ID']),
              'attempt': int(os.environ['GITHUB_RUN_ATTEMPT']),
              'head_sha': os.environ['GITHUB_SHA'],
              'transport_parts': len(shas),
              'missing': missing,
              'invalid': invalid,
              'expected_payload_sha256': expected,
              'actual_payload_sha256': actual,
              'archive_bytes': archive_bytes,
              'digest_matches': digest_matches,
              'reconstruction_error': reconstruction_error,
          }
          Path('.github/v060-diagnose-status.json').write_text(json.dumps(result, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          print(json.dumps(result, ensure_ascii=False, indent=2))
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/v060-diagnose-status.json
          git commit -m 'ci: record canonical v0.6.0 transport diagnosis'
          git pull --rebase origin main
          git push origin HEAD:main
