name: Fix current v0.5.3 static sources once

on:
  push:
    branches: [main]
    paths:
      - .github/v053-static-fix-trigger

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONNOUSERSITE: "1"
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-ci.lock
      - name: Apply exact type and lint fixes
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("scripts/build_engineering_report.py")
          text = path.read_text(encoding="utf-8")
          replacements = {
              "    y = 325\n": "    y = 325.0\n",
              'f"{index}. {str(item)}"': 'f"{index}. {item!s}"',
              "    command_y = 128\n": "    command_y = 128.0\n",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"expected source fragment missing: {old!r}")
              text = text.replace(old, new, 1)
          path.write_text(text, encoding="utf-8", newline="\n")
          PY
      - name: Format affected sources
        run: |
          python -m ruff format \
            scripts/build_engineering_report.py \
            scripts/build_research_quality_dashboard.py \
            scripts/build_test_dashboard.py \
            tsao_researcher/scientific_quality.py \
            tsao_researcher/__main__.py \
            tests/test_quality_cli.py
      - name: Verify all static gates
        run: |
          python -m ruff format --check scripts tsao_researcher tests
          python -m ruff check scripts tsao_researcher tests
          python -m mypy scripts tsao_researcher
          python -m bandit -q -lll -r scripts tsao_researcher
      - name: Commit verified source formatting
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/build_engineering_report.py scripts/build_research_quality_dashboard.py scripts/build_test_dashboard.py tsao_researcher/scientific_quality.py tsao_researcher/__main__.py tests/test_quality_cli.py
          git commit -m 'fix: satisfy v0.5.3 static quality gates'
          git push origin HEAD:main
