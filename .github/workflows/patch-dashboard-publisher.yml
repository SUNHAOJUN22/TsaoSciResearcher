name: Patch dashboard publisher once

on:
  push:
    branches: [main]
    paths:
      - .github/patch-dashboard-publisher-trigger

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Patch verified publisher
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/finalize-test-dashboard-v2.yml')
          text = workflow.read_text(encoding='utf-8')
          old = """          git add -A
          git commit -m 'docs: add verified automated-test dashboard'
          git push origin HEAD:main
"""
          new = """          for path in \\
            .github/workflows/finalize-test-dashboard.yml \\
            .github/workflows/finalize-test-dashboard-v2.yml \\
            .github/workflows/diagnose-dashboard-ruff.yml \\
            .github/workflows/fix-dashboard-source.yml \\
            .github/workflows/patch-dashboard-publisher.yml; do
            if git ls-files --error-unmatch \"$path\" >/dev/null 2>&1; then
              git checkout -- \"$path\"
            fi
          done
          git add -A
          git commit -m 'docs: add verified automated-test dashboard'
          git pull --rebase origin main
          git push origin HEAD:main
"""
          if old not in text:
              raise SystemExit('publisher commit block not found')
          workflow.write_text(text.replace(old, new, 1), encoding='utf-8', newline='\n')

          materializer = Path('scripts/finalize_test_dashboard.py')
          text = materializer.read_text(encoding='utf-8')
          marker = '    ".github/fix-dashboard-source-trigger",\n'
          addition = marker + (
              '    ".github/workflows/patch-dashboard-publisher.yml",\n'
              '    ".github/patch-dashboard-publisher-trigger",\n'
          )
          if '.github/workflows/patch-dashboard-publisher.yml' not in text:
              if text.count(marker) != 1:
                  raise SystemExit('publisher temporary-path marker mismatch')
              text = text.replace(marker, addition, 1)
          materializer.write_text(text, encoding='utf-8', newline='\n')
          PY
          python -m py_compile scripts/finalize_test_dashboard.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/finalize-test-dashboard-v2.yml scripts/finalize_test_dashboard.py
          git commit -m 'ci: make dashboard publication workflow-safe'
          git push origin HEAD:main
