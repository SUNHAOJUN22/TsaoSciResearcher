name: Pytest Diagnostics

on:
  push:
    branches: [agent/tsao-sci-researcher-v040-reaudit]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pytest-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-suite-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONNOUSERSITE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - name: Run complete suite with JUnit evidence
        run: python -m pytest -vv --junitxml=pytest-diagnostics.xml
      - name: Upload JUnit evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pytest-diagnostics
          path: pytest-diagnostics.xml
          if-no-files-found: error
          retention-days: 7
