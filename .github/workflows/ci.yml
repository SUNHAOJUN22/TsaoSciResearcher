name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compatibility:
    name: compatibility-${{ matrix.os }}-py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONNOUSERSITE: "1"
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact CI dependencies and package
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
          python -m pip check
      - name: Compile runtime
        env:
          PYTHONPYCACHEPREFIX: ${{ runner.temp }}/tsr-pycache
        run: python -m compileall -q scripts tsao_researcher tests
      - name: Cross-platform critical tests
        run: >-
          python -m pytest -q -p hypothesis.extra.pytestplugin
          tests/test_archive_safety.py
          tests/test_common.py
          tests/test_install.py
          tests/test_project_state.py
          tests/test_runtime_v2.py
      - name: CLI smoke
        run: |
          python -m tsao_researcher route "run an actual DFT calculation"
          python -m tsao_researcher search "polymer molecular dynamics" --limit 3

  regression:
    name: complete-regression
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONNOUSERSITE: "1"
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact CI dependencies and package
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
          python -m pip check
      - name: Repository and contract audit
        run: |
          python scripts/audit_repository.py
          python scripts/validate_structure.py
          python scripts/generate_checksums.py --check
          python scripts/build_capability_index.py --check
          python scripts/route_task.py --self-test
          python scripts/validate_figure.py examples/figure-contract.json
      - name: Full test suite
        run: python -m pytest -q -p hypothesis.extra.pytestplugin --junitxml=artifacts/junit.xml
      - name: Upload regression evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: regression-evidence
          path: artifacts
          if-no-files-found: warn
          retention-days: 7

  order-independence:
    name: reverse-and-seeded-order
    needs: regression
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONNOUSERSITE: "1"
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      TSR_TEST_ORDER_SEED: "20260721"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact CI dependencies and package
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
      - name: Reverse-order regression
        run: python -m pytest -q -p hypothesis.extra.pytestplugin -p tests.reverse_order_plugin
      - name: Seeded random-order regression
        run: python -m pytest -q -p hypothesis.extra.pytestplugin -p tests.random_order_plugin

  quality:
    name: static-quality-security-mutation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONNOUSERSITE: "1"
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact CI dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-ci.lock
      - name: Ruff format gate
        run: python -m ruff format --check scripts tsao_researcher tests
      - name: Ruff lint gate
        run: python -m ruff check scripts tsao_researcher tests
      - name: Mypy strict gate
        run: python -m mypy scripts tsao_researcher
      - name: Bandit security gate
        run: python -m bandit -q -lll -r scripts tsao_researcher
      - name: Critical mutation gate
        run: python scripts/run_mutation_smoke.py --json-out artifacts/mutation-results.json
      - name: Upload quality evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: quality-evidence
          path: artifacts
          if-no-files-found: warn
          retention-days: 7

  performance-release:
    name: performance-and-reproducible-release
    needs: regression
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONNOUSERSITE: "1"
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact CI dependencies and package
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
      - name: Bounded performance regression
        run: python scripts/performance_smoke.py --json-out artifacts/performance.json
      - name: Reproducible release
        run: |
          python scripts/package_release.py --out dist-a
          python scripts/package_release.py --out dist-b
          cmp dist-a/TsaoSciResearcher-v0.5.1.zip dist-b/TsaoSciResearcher-v0.5.1.zip
          python scripts/validate_release.py
          sha256sum dist-a/TsaoSciResearcher-v0.5.1.zip > artifacts/release.sha256
      - name: Upload release evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: performance-release-evidence
          path: |
            artifacts
            dist-a
          if-no-files-found: error
          retention-days: 7
