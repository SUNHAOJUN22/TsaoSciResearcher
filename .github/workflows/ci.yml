name: CI

on:
  push:
    branches: [main, agent/tsao-sci-researcher-v040-reaudit]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test-${{ matrix.os }}-py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONNOUSERSITE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - name: Create evidence directory
        run: python -c "from pathlib import Path; Path('artifacts').mkdir(exist_ok=True)"
      - name: Record environment
        run: >-
          python -c "import json, platform, sys;
          from pathlib import Path;
          Path('artifacts/environment.json').write_text(
          json.dumps({'platform': platform.platform(), 'python': sys.version}, indent=2) + '\n',
          encoding='utf-8')"
      - name: Repository audit
        run: python scripts/audit_repository.py
      - name: Compile Python
        env:
          PYTHONPYCACHEPREFIX: ${{ runner.temp }}/tsr-pycache
        run: python -m compileall -q scripts tests
      - name: Structure validation
        run: python scripts/validate_structure.py
      - name: Repository tree checksum
        run: python scripts/generate_checksums.py --check
      - name: Capability catalog validation
        run: python scripts/build_capability_index.py --check
      - name: Router self-test
        run: python scripts/route_task.py --self-test
      - name: Figure contract validation
        run: python scripts/validate_figure.py examples/figure-contract.json
      - name: Pytest security and I/O
        run: python -m pytest -q tests/test_archive_safety.py tests/test_common.py tests/test_install.py
      - name: Pytest state and contracts
        run: python -m pytest -q tests/test_project_state.py tests/test_claims.py tests/test_schemas.py
      - name: Pytest package and CLI isolation
        run: python -m pytest -q tests/test_import_isolation.py tests/test_cli_contracts.py
      - name: Pytest routing properties
        run: python -m pytest -q tests/test_router.py
      - name: Pytest deterministic release
        run: python -m pytest -q tests/test_release.py
      - name: Full pytest suite
        run: >-
          python -m pytest -q
          --junitxml=artifacts/junit-${{ matrix.os }}-py${{ matrix.python-version }}.xml
      - name: Deterministic release validation
        run: python scripts/validate_release.py
      - name: Upload matrix evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: evidence-${{ matrix.os }}-py${{ matrix.python-version }}
          path: artifacts
          if-no-files-found: warn
          retention-days: 7

  discover-tests:
    name: discover-test-files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      files: ${{ steps.inventory.outputs.files }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Enumerate all pytest modules
        id: inventory
        shell: bash
        run: |
          mkdir -p artifacts
          python - <<'PY' | tee artifacts/test-inventory.txt >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          files = [path.as_posix() for path in sorted(Path("tests").glob("test_*.py"))]
          if not files:
              raise SystemExit("no pytest modules discovered")
          print("files=" + json.dumps(files, separators=(",", ":")))
          print(f"count={len(files)}")
          PY
      - name: Upload test inventory
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-inventory
          path: artifacts/test-inventory.txt
          if-no-files-found: warn
          retention-days: 7

  isolated-tests:
    name: isolated-${{ matrix.file }}
    needs: discover-tests
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        file: ${{ fromJSON(needs.discover-tests.outputs.files) }}
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONNOUSERSITE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - name: Run module independently
        run: python -m pytest -q "${{ matrix.file }}"

  order-independence:
    name: order-independence-and-repeatability
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONNOUSERSITE: "1"
      TSR_TEST_ORDER_SEED: "20260717"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - name: Create order evidence directory
        run: python -c "from pathlib import Path; Path('artifacts/order').mkdir(parents=True, exist_ok=True)"
      - name: Record order seed
        run: python -c "from pathlib import Path; Path('artifacts/order/seed.txt').write_text('20260717\n', encoding='utf-8')"
      - name: Reverse-order suite
        run: >-
          python -m pytest -q -p tests.reverse_order_plugin
          --junitxml=artifacts/order/reverse.xml
      - name: Random-order suite
        run: >-
          python -m pytest -q -p tests.random_order_plugin
          --junitxml=artifacts/order/random-seed-20260717.xml
      - name: Repeat complete suite 1 of 5
        run: python -m pytest -q --junitxml=artifacts/order/repeat-1.xml
      - name: Repeat complete suite 2 of 5
        run: python -m pytest -q --junitxml=artifacts/order/repeat-2.xml
      - name: Repeat complete suite 3 of 5
        run: python -m pytest -q --junitxml=artifacts/order/repeat-3.xml
      - name: Repeat complete suite 4 of 5
        run: python -m pytest -q --junitxml=artifacts/order/repeat-4.xml
      - name: Repeat complete suite 5 of 5
        run: python -m pytest -q --junitxml=artifacts/order/repeat-5.xml
      - name: Upload order evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: order-independence-evidence
          path: artifacts/order
          if-no-files-found: warn
          retention-days: 7

  quality:
    name: static-quality-security-and-mutation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONNOUSERSITE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install quality dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - name: Create quality evidence directory
        run: >-
          python -c "import json, platform, sys; from pathlib import Path;
          p=Path('artifacts/quality'); p.mkdir(parents=True, exist_ok=True);
          (p/'environment.json').write_text(json.dumps({'platform': platform.platform(), 'python': sys.version}, indent=2) + '\\n', encoding='utf-8')"
      - name: Ruff format gate
        run: python -m ruff format --check scripts tests
      - name: Ruff lint gate
        run: python -m ruff check scripts tests
      - name: Mypy strict gate
        run: python -m mypy scripts
      - name: Bandit security gate
        run: python -m bandit -q -lll -r scripts
      - name: Critical mutation gate
        run: >-
          python scripts/run_mutation_smoke.py
          --json-out artifacts/quality/mutation-results.json
      - name: Upload quality evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: quality-and-mutation-evidence
          path: artifacts/quality
          if-no-files-found: warn
          retention-days: 7

  performance:
    name: bounded-performance-regression
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONNOUSERSITE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install performance dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - name: Create performance evidence directory
        run: >-
          python -c "import json, platform, sys; from pathlib import Path;
          p=Path('artifacts/performance'); p.mkdir(parents=True, exist_ok=True);
          (p/'environment.json').write_text(json.dumps({'platform': platform.platform(), 'python': sys.version}, indent=2) + '\\n', encoding='utf-8')"
      - name: Run bounded benchmarks
        run: >-
          python scripts/performance_smoke.py
          --json-out artifacts/performance/performance-results.json
      - name: Upload performance evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: performance-evidence
          path: artifacts/performance
          if-no-files-found: warn
          retention-days: 7
