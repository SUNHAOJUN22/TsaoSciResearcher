name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONNOUSERSITE: "1"
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

jobs:
  compatibility:
    name: compatibility-${{ matrix.os }}-py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact CI dependencies and package
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
          python -m pip check
      - name: Prepare transitional checksum
        shell: bash
        run: |
          if [ -f .github/finalize-v052 ]; then
            python scripts/generate_checksums.py
          fi
      - name: Compile runtime
        env:
          PYTHONPYCACHEPREFIX: ${{ runner.temp }}/tsr-pycache
        run: python -m compileall -q scripts tsao_researcher tests
      - name: Cross-platform critical tests
        run: >-
          python -m pytest -q -p hypothesis.extra.pytestplugin
          tests/test_archive_safety.py
          tests/test_common.py
          tests/test_install.py
          tests/test_project_state.py
          tests/test_runtime_v2.py
          tests/test_handoff_cli.py
          tests/test_named_capabilities.py
      - name: CLI smoke
        run: |
          python -m tsao_researcher route "run an actual DFT calculation"
          python -m tsao_researcher search "polymer molecular dynamics" --limit 3
          python scripts/validate_schemas.py

  regression:
    name: complete-regression
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact CI dependencies and package
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
          python -m pip check
      - name: Prepare transitional checksum
        run: |
          if [ -f .github/finalize-v052 ]; then
            python scripts/generate_checksums.py
          fi
      - name: Repository and contract audit
        run: |
          python scripts/validate_schemas.py
          python scripts/audit_repository.py
          python scripts/validate_structure.py
          python scripts/build_readme_facts.py --check
          python scripts/generate_checksums.py --check
          python scripts/build_capability_index.py --check
          python scripts/route_task.py --self-test
          python scripts/validate_figure.py examples/figure-contract.json
      - name: Full test suite
        run: python -m pytest -q -p hypothesis.extra.pytestplugin --junitxml=artifacts/junit.xml
      - name: Upload regression evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: regression-evidence
          path: artifacts
          if-no-files-found: warn
          retention-days: 7

  order-independence:
    name: reverse-and-seeded-order
    needs: regression
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TSR_TEST_ORDER_SEED: "20260722"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact CI dependencies and package
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
      - name: Prepare transitional checksum
        run: |
          if [ -f .github/finalize-v052 ]; then
            python scripts/generate_checksums.py
          fi
      - name: Reverse-order regression
        run: python -m pytest -q -p hypothesis.extra.pytestplugin -p tests.reverse_order_plugin
      - name: Seeded random-order regression
        run: python -m pytest -q -p hypothesis.extra.pytestplugin -p tests.random_order_plugin

  quality:
    name: static-quality-security-mutation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact CI dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-ci.lock
      - name: Prepare transitional checksum
        run: |
          if [ -f .github/finalize-v052 ]; then
            python scripts/generate_checksums.py
          fi
      - name: Ruff format gate
        run: python -m ruff format --check scripts tsao_researcher tests
      - name: Ruff lint gate
        run: python -m ruff check scripts tsao_researcher tests
      - name: Mypy strict gate
        run: python -m mypy scripts tsao_researcher
      - name: Bandit security gate
        run: python -m bandit -q -lll -r scripts tsao_researcher
      - name: Critical mutation gate
        run: python scripts/run_mutation_smoke.py --json-out artifacts/mutation-results.json
      - name: Upload quality evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: quality-evidence
          path: artifacts
          if-no-files-found: warn
          retention-days: 7

  performance-release:
    name: performance-and-reproducible-release
    needs: regression
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact CI dependencies and package
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
      - name: Prepare transitional checksum
        run: |
          if [ -f .github/finalize-v052 ]; then
            python scripts/generate_checksums.py
          fi
      - name: Bounded performance regression
        run: python scripts/performance_smoke.py --json-out artifacts/performance.json
      - name: Reproducible release
        shell: bash
        run: |
          VERSION="$(tr -d '\r\n' < VERSION)"
          python scripts/package_release.py --out dist-a
          python scripts/package_release.py --out dist-b
          cmp "dist-a/TsaoSciResearcher-v${VERSION}.zip" "dist-b/TsaoSciResearcher-v${VERSION}.zip"
          python scripts/validate_release.py
          sha256sum "dist-a/TsaoSciResearcher-v${VERSION}.zip" > artifacts/release.sha256
      - name: Upload release evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: performance-release-evidence
          path: |
            artifacts
            dist-a
          if-no-files-found: error
          retention-days: 7

  record-main-validation:
    name: record-main-validation
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: [compatibility, regression, order-independence, quality, performance-release]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Detect one-time finalization
        id: finalize
        shell: bash
        run: |
          if [ -f .github/finalize-v052 ]; then
            echo 'apply=true' >> "$GITHUB_OUTPUT"
          else
            echo 'apply=false' >> "$GITHUB_OUTPUT"
          fi
      - name: Capture gate results
        if: steps.finalize.outputs.apply == 'true'
        env:
          RESULT_COMPATIBILITY: ${{ needs.compatibility.result }}
          RESULT_REGRESSION: ${{ needs.regression.result }}
          RESULT_ORDER: ${{ needs.order-independence.result }}
          RESULT_QUALITY: ${{ needs.quality.result }}
          RESULT_PERFORMANCE: ${{ needs.performance-release.result }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path

          results = {
              "compatibility": os.environ["RESULT_COMPATIBILITY"],
              "regression": os.environ["RESULT_REGRESSION"],
              "order_independence": os.environ["RESULT_ORDER"],
              "quality": os.environ["RESULT_QUALITY"],
              "performance_release": os.environ["RESULT_PERFORMANCE"],
          }
          Path(".github/finalization-status.json").write_text(
              json.dumps(results, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          failed = {name: result for name, result in results.items() if result != "success"}
          if failed:
              raise SystemExit("failed CI gates: " + json.dumps(failed, sort_keys=True))
          PY
      - name: Publish failed-gate diagnostics
        if: ${{ failure() && steps.finalize.outputs.apply == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/finalization-status.json
          if ! git diff --cached --quiet; then
            git commit -m 'ci: record v0.5.2 gate diagnostics'
            git push origin HEAD:main
          fi
      - name: Set up Python
        if: steps.finalize.outputs.apply == 'true' && success()
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact dependencies
        if: steps.finalize.outputs.apply == 'true' && success()
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
      - name: Record verified v0.5.2 evidence
        if: steps.finalize.outputs.apply == 'true' && success()
        env:
          VALIDATED_COMMIT: ${{ github.sha }}
          VALIDATED_RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import re
          import subprocess
          from datetime import date
          from pathlib import Path

          command = [
              "python",
              "-m",
              "pytest",
              "--collect-only",
              "-q",
              "-p",
              "hypothesis.extra.pytestplugin",
          ]
          completed = subprocess.run(command, check=True, capture_output=True, text=True)
          text = completed.stdout + "\n" + completed.stderr
          match = re.search(r"(\d+) tests? collected", text)
          if not match:
              raise SystemExit("unable to determine collected test count")
          payload = {
              "schema_version": "1.1",
              "release": "0.5.2",
              "evidence_date": date.today().isoformat(),
              "status": "PASS",
              "workflow": "CI",
              "run_id": int(os.environ["VALIDATED_RUN_ID"]),
              "validated_commit": os.environ["VALIDATED_COMMIT"],
              "tests_collected": int(match.group(1)),
              "failures": 0,
              "platforms": [
                  "ubuntu-latest / Python 3.10",
                  "ubuntu-latest / Python 3.13",
                  "windows-latest / Python 3.12",
                  "macos-latest / Python 3.12",
              ],
              "gates": {
                  "repository_and_schema_audit": "PASS",
                  "full_regression": "PASS",
                  "reverse_and_seeded_order": "PASS",
                  "ruff_format_and_lint": "PASS",
                  "mypy_strict": "PASS",
                  "bandit_high_severity": "PASS",
                  "critical_mutation": "15/15 killed",
                  "performance_smoke": "PASS",
                  "byte_identical_release_builds": "PASS",
              },
              "interpretation": [
                  "The v0.5.2 software and documentation contracts passed the repository CI gates.",
                  "Software validation does not imply scientific acceptance of external calculations or experiments.",
              ],
          }
          Path("docs/VALIDATION_EVIDENCE.json").write_text(
              json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
          rm .github/finalize-v052
          rm -f .github/finalization-status.json
          python scripts/build_readme_facts.py --write
          python scripts/generate_checksums.py
          python scripts/generate_checksums.py --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/VALIDATION_EVIDENCE.json docs/README_FACTS.json SHA256SUMS .github/finalize-v052 .github/finalization-status.json
          git commit -m 'ci: record verified v0.5.2 main evidence'
          git push origin HEAD:main
