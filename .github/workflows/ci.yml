name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Repository audit
        if: always()
        run: python scripts/audit_repository.py
      - name: Compile Python
        if: always()
        run: python -m compileall -q scripts tests
      - name: Validate structure
        if: always()
        run: python scripts/validate_structure.py
      - name: Validate capability index
        if: always()
        run: python scripts/build_capability_index.py --check
      - name: Validate tree checksum
        if: always()
        run: python scripts/generate_checksums.py --check
      - name: Router self-test
        if: always()
        run: python scripts/route_task.py --self-test
      - name: Figure Contract validation
        if: always()
        run: python scripts/validate_figure.py examples/figure-contract.json
      - name: Unit tests
        if: always()
        run: python -m unittest discover -s tests -v
