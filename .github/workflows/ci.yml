name: CI

on:
  push:
    branches: [main, agent/tsao-sci-researcher-v040-reaudit]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test-${{ matrix.os }}-py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONNOUSERSITE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - name: Repository audit
        run: python scripts/audit_repository.py
      - name: Compile Python
        env:
          PYTHONPYCACHEPREFIX: ${{ runner.temp }}/tsr-pycache
        run: python -m compileall -q scripts tests
      - name: Structure validation
        run: python scripts/validate_structure.py
      - name: Capability catalog validation
        run: python scripts/build_capability_index.py --check
      - name: Router self-test
        run: python scripts/route_task.py --self-test
      - name: Figure contract validation
        run: python scripts/validate_figure.py examples/figure-contract.json
      - name: Pytest security and I/O
        run: python -m pytest -q tests/test_archive_safety.py tests/test_common.py tests/test_install.py
      - name: Pytest state and contracts
        run: python -m pytest -q tests/test_project_state.py tests/test_claims.py tests/test_schemas.py
      - name: Pytest routing properties
        run: python -m pytest -q tests/test_router.py
      - name: Pytest deterministic release
        run: python -m pytest -q tests/test_release.py
      - name: Deterministic release validation
        run: python scripts/validate_release.py

  quality:
    name: static-quality-and-security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONNOUSERSITE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install quality dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - name: Ruff format sentinel gate
        run: >-
          python -m ruff format --check
          scripts/common.py scripts/install.py
          tests/test_archive_safety.py tests/test_common.py tests/test_project_state.py tests/test_release.py
      - name: Ruff lint gate
        run: >-
          python -m ruff check
          scripts/common.py scripts/route_task.py scripts/archive_safety.py
          scripts/package_release.py scripts/install.py scripts/init_project.py
          scripts/validate_project.py scripts/validate_evidence.py scripts/validate_claims.py
          scripts/validate_release.py scripts/audit_repository.py
          scripts/run_tests.py scripts/run_mutation_smoke.py scripts/performance_smoke.py
          tests/test_archive_safety.py tests/test_common.py tests/test_install.py
          tests/test_project_state.py tests/test_claims.py tests/test_router.py
          tests/test_release.py tests/test_schemas.py
      - name: Mypy strict core gate
        run: >-
          python -m mypy
          scripts/common.py
          scripts/route_task.py
          scripts/archive_safety.py
          scripts/package_release.py
          scripts/install.py
          scripts/init_project.py
          scripts/validate_project.py
          scripts/validate_evidence.py
          scripts/validate_claims.py
          scripts/validate_release.py
      - name: Bandit security gate
        run: python -m bandit -q -lll -r scripts
      - name: Mutation smoke gate
        run: python scripts/run_mutation_smoke.py
      - name: Performance smoke gate
        run: python scripts/performance_smoke.py
