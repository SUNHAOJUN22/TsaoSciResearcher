name: Final validate TsaoSciResearcher v0.5.2 once

on:
  push:
    branches: [main]
    paths:
      - .github/final-v052-once-trigger

permissions:
  contents: write

concurrency:
  group: final-validate-v052-once
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONNOUSERSITE: "1"
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

jobs:
  heartbeat:
    name: final-validation-heartbeat
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Publish running state
        env:
          VALIDATED_COMMIT: ${{ github.sha }}
          VALIDATED_RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          Path(".github/final-v052-once-result.json").write_text(
              json.dumps(
                  {
                      "status": "RUNNING",
                      "release": "0.5.2",
                      "run_id": int(os.environ["VALIDATED_RUN_ID"]),
                      "validated_commit": os.environ["VALIDATED_COMMIT"],
                  },
                  indent=2,
                  sort_keys=True,
              ) + "\n",
              encoding="utf-8",
          )
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/final-v052-once-result.json
          git commit -m 'ci: mark v0.5.2 final validation running'
          git push origin HEAD:main

  compatibility:
    name: final-compatibility-${{ matrix.os }}-py${{ matrix.python-version }}
    needs: heartbeat
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact dependencies and package
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
          python -m pip check
      - name: Compile runtime
        env:
          PYTHONPYCACHEPREFIX: ${{ runner.temp }}/tsr-pycache
        run: python -m compileall -q scripts tsao_researcher tests
      - name: Critical tests
        run: >-
          python -m pytest -q -p hypothesis.extra.pytestplugin
          tests/test_archive_safety.py
          tests/test_common.py
          tests/test_install.py
          tests/test_project_state.py
          tests/test_runtime_v2.py
          tests/test_handoff_cli.py
          tests/test_named_capabilities.py
      - name: CLI and schema smoke
        run: |
          python -m tsao_researcher route "run an actual DFT calculation"
          python -m tsao_researcher search "polymer molecular dynamics" --limit 3
          python scripts/validate_schemas.py

  comprehensive:
    name: final-comprehensive-linux
    needs: heartbeat
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout final candidate
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact dependencies and package
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
          python -m pip check
      - name: Simulate permanent final tree
        shell: bash
        run: |
          rm -f .github/workflows/final-validate-v052-once.yml
          rm -f .github/final-v052-once-trigger .github/final-v052-once-result.json
          python scripts/build_readme_facts.py --write
          python scripts/generate_checksums.py --write
      - name: Repository and contract audit
        run: |
          python scripts/validate_schemas.py
          python scripts/audit_repository.py
          python scripts/validate_structure.py
          python scripts/build_readme_facts.py --check
          python scripts/generate_checksums.py --check
          python scripts/build_capability_index.py --check
          python scripts/route_task.py --self-test
          python scripts/validate_figure.py examples/figure-contract.json
      - name: Complete regression
        run: python -m pytest -q -p hypothesis.extra.pytestplugin
      - name: Reverse-order regression
        run: python -m pytest -q -p hypothesis.extra.pytestplugin -p tests.reverse_order_plugin
      - name: Seeded random-order regression
        env:
          TSR_TEST_ORDER_SEED: "20260722"
        run: python -m pytest -q -p hypothesis.extra.pytestplugin -p tests.random_order_plugin
      - name: Static quality and security
        run: |
          python -m ruff format --check scripts tsao_researcher tests
          python -m ruff check scripts tsao_researcher tests
          python -m mypy scripts tsao_researcher
          python -m bandit -q -lll -r scripts tsao_researcher
      - name: Critical mutation gate
        run: python scripts/run_mutation_smoke.py --json-out /tmp/mutation-results.json
      - name: Performance gate
        run: python scripts/performance_smoke.py --json-out /tmp/performance.json
      - name: Byte-identical v0.5.2 release
        shell: bash
        run: |
          rm -rf /tmp/dist-a /tmp/dist-b
          python scripts/package_release.py --out /tmp/dist-a
          python scripts/package_release.py --out /tmp/dist-b
          cmp /tmp/dist-a/TsaoSciResearcher-v0.5.2.zip /tmp/dist-b/TsaoSciResearcher-v0.5.2.zip
          python scripts/validate_release.py

  report:
    name: final-validation-report
    if: ${{ always() }}
    needs: [heartbeat, compatibility, comprehensive]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Publish final status
        env:
          HEARTBEAT_RESULT: ${{ needs.heartbeat.result }}
          COMPATIBILITY_RESULT: ${{ needs.compatibility.result }}
          COMPREHENSIVE_RESULT: ${{ needs.comprehensive.result }}
          VALIDATED_COMMIT: ${{ github.sha }}
          VALIDATED_RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          jobs = {
              "heartbeat": os.environ["HEARTBEAT_RESULT"],
              "compatibility": os.environ["COMPATIBILITY_RESULT"],
              "comprehensive": os.environ["COMPREHENSIVE_RESULT"],
          }
          success = all(value == "success" for value in jobs.values())
          Path(".github/final-v052-once-result.json").write_text(
              json.dumps(
                  {
                      "status": "PASS" if success else "FAIL",
                      "release": "0.5.2",
                      "run_id": int(os.environ["VALIDATED_RUN_ID"]),
                      "validated_commit": os.environ["VALIDATED_COMMIT"],
                      "jobs": jobs,
                  },
                  indent=2,
                  sort_keys=True,
              ) + "\n",
              encoding="utf-8",
          )
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/final-v052-once-result.json
          git commit -m 'ci: report v0.5.2 final validation result'
          git push origin HEAD:main
