name: Finalize verified TsaoSciResearcher v0.5.2 evidence

on:
  push:
    branches: [main]
    paths:
      - .github/final-v052-once-trigger

permissions:
  contents: write

concurrency:
  group: finalize-v052-evidence-once
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONNOUSERSITE: "1"

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact validation dependencies
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
          python -m pip check
      - name: Verify PASS result and build permanent-tree evidence
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          result_path = Path('.github/final-v052-once-result.json')
          result = json.loads(result_path.read_text(encoding='utf-8'))
          expected_jobs = {
              'heartbeat': 'success',
              'compatibility': 'success',
              'comprehensive': 'success',
          }
          if result.get('status') != 'PASS':
              raise SystemExit(f"final validation was not PASS: {result}")
          if result.get('run_id') != 29940827319:
              raise SystemExit(f"unexpected validation run: {result.get('run_id')}")
          if result.get('jobs') != expected_jobs:
              raise SystemExit(f"unexpected job results: {result.get('jobs')}")

          evidence = {
              'schema_version': '1.2',
              'release': '0.5.2',
              'evidence_date': '2026-07-23',
              'status': 'PASS',
              'workflow': {
                  'name': 'Final validate TsaoSciResearcher v0.5.2 once',
                  'run_id': 29940827319,
                  'validated_commit': '131cf1d8dfa8b969f662a14a6a3568e72ecaaa9a',
                  'result_commit': 'b53cd5ce20fa72f66a9999abd172a84b01278317',
                  'permanent_tree_simulated': True,
              },
              'compatibility': {
                  'ubuntu_python_3_10': 'PASS',
                  'ubuntu_python_3_13': 'PASS',
                  'windows_python_3_12': 'PASS',
                  'macos_python_3_12': 'PASS',
              },
              'gates': {
                  'repository_and_contract_audit': 'PASS',
                  'json_schemas_15': 'PASS',
                  'complete_regression': 'PASS',
                  'reverse_order_regression': 'PASS',
                  'seeded_random_order_regression': 'PASS',
                  'ruff_format_and_lint': 'PASS',
                  'mypy_strict': 'PASS',
                  'bandit_high_severity': 'PASS',
                  'critical_mutation_killed': '15/15',
                  'bounded_performance': 'PASS',
                  'byte_identical_release_builds': 'PASS',
              },
              'verified_inventory': {
                  'capability_records': 340,
                  'workbook_named_capabilities': 322,
                  'runtime_core_capabilities': 18,
                  'generic_domain_placeholders': 0,
                  'workflows': 15,
                  'schemas': 15,
                  'domain_packs': 7,
                  'test_modules': 22,
              },
              'interpretation': [
                  'The evidence validates the software repository and its declared contracts.',
                  'The comprehensive job removed the one-shot validation workflow, trigger, and result before auditing the simulated permanent tree.',
                  'Software validation does not imply scientific acceptance of external calculations, experiments, medical claims, legal conclusions, or safety decisions.',
              ],
          }
          Path('docs/VALIDATION_EVIDENCE.json').write_text(
              json.dumps(evidence, ensure_ascii=False, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY

          rm -f .github/workflows/final-validate-v052-once.yml
          rm -f .github/final-v052-once-trigger .github/final-v052-once-result.json

          python scripts/build_readme_facts.py --check
          python scripts/audit_repository.py
          python scripts/validate_structure.py
          python scripts/generate_checksums.py --write
          python scripts/generate_checksums.py --check

          cp docs/VALIDATION_EVIDENCE.json /tmp/VALIDATION_EVIDENCE.json
          cp SHA256SUMS /tmp/SHA256SUMS
          git checkout HEAD -- \
            .github/workflows/final-validate-v052-once.yml \
            .github/final-v052-once-trigger \
            .github/final-v052-once-result.json
          cp /tmp/VALIDATION_EVIDENCE.json docs/VALIDATION_EVIDENCE.json
          cp /tmp/SHA256SUMS SHA256SUMS
      - name: Commit verified evidence and permanent-tree checksum
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/VALIDATION_EVIDENCE.json SHA256SUMS
          git diff --cached --quiet && { echo 'expected evidence changes are missing'; exit 1; }
          git commit -m 'docs: publish verified v0.5.2 validation evidence'
          git push origin HEAD:main
