name: Verify embedded v0.5.0 payload

on:
  pull_request:
    branches: [main]
  push:
    branches: [agent/autonomous-v0.5.0]
    paths:
      - .v050-payload/**
      - scripts/materialize_v050_from_release.py
      - .github/workflows/verify-embedded-v050.yml

permissions:
  contents: write

jobs:
  verify-payload:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/autonomous-v0.5.0
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Reconstruct, checksum and inspect release archive
        id: verify
        continue-on-error: true
        run: |
          python - <<'PY'
          import importlib.util
          import json
          import tempfile
          import traceback
          import zipfile
          from pathlib import Path

          path = Path('scripts/materialize_v050_from_release.py')
          spec = importlib.util.spec_from_file_location('materializer', path)
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)
          expected = '75deca80fafaf8f5193bcbb106b52c9661cd072388968cde9fbf76332f2f61d7'
          payload = Path('.v050-payload')
          body_paths = sorted(payload.glob('part-*.txt'))
          tail_paths = sorted(payload.glob('tailb64-*.txt'))
          b64_chars = set('ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=')

          tail_report = []
          for p in tail_paths:
              text = module._compact_text(p)
              invalid = [{'index': i, 'char': repr(ch), 'codepoint': ord(ch)} for i, ch in enumerate(text) if ch not in b64_chars]
              tail_report.append({
                  'name': p.name,
                  'characters': len(text),
                  'mod4': len(text) % 4,
                  'prefix': text[:24],
                  'suffix': text[-24:],
                  'padding_count': text.count('='),
                  'invalid_count': len(invalid),
                  'invalid': invalid[:20],
              })

          report = {
              'expected_sha256': expected,
              'body_files': [
                  {'name': p.name, 'characters': len(module._compact_text(p)), 'mod5': len(module._compact_text(p)) % 5}
                  for p in body_paths
              ],
              'tail_files': tail_report,
              'candidates': [],
          }
          try:
              for name, candidate in module._decode_payload_candidates(payload):
                  report['candidates'].append({
                      'name': name,
                      'bytes': len(candidate),
                      'sha256': module.sha256_bytes(candidate),
                      'prefix_hex': candidate[:12].hex(),
                      'suffix_hex': candidate[-12:].hex(),
                      'zip_signature': candidate.startswith(b'PK\\x03\\x04'),
                      'bz2_signature': candidate.startswith(b'BZh'),
                  })
              data, diagnostics = module.reconstruct_embedded_archive(payload, expected)
              assert module.sha256_bytes(data) == expected
              with tempfile.TemporaryDirectory() as temp_name:
                  temp = Path(temp_name)
                  archive = temp / 'release.zip'
                  archive.write_bytes(data)
                  with zipfile.ZipFile(archive) as bundle:
                      bad = bundle.testzip()
                      assert bad is None, bad
                  extracted = temp / 'extracted'
                  extracted.mkdir()
                  module.extract_checked(archive, extracted)
                  source = module.find_source_root(extracted)
                  assert (source / 'VERSION').read_text(encoding='utf-8').strip() == '0.5.0'
              report.update({
                  'status': 'passed',
                  'archive_bytes': len(data),
                  'selected_candidate': diagnostics['selected'],
                  'source_version': '0.5.0',
                  'crc': 'passed',
                  'safe_extraction': 'passed',
              })
          except Exception as exc:  # noqa: BLE001
              report.update({
                  'status': 'failed',
                  'error_type': type(exc).__name__,
                  'error': str(exc),
                  'traceback_tail': traceback.format_exc().splitlines()[-8:],
              })
          out = Path('docs/EMBEDDED_PAYLOAD_DIAGNOSTICS.json')
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(report, indent=2, sort_keys=True), encoding='utf-8')
          print(out.read_text(encoding='utf-8'))
          if report['status'] != 'passed':
              raise SystemExit(1)
          PY
      - name: Commit diagnostic snapshot on branch pushes
        if: github.event_name == 'push' && always()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/EMBEDDED_PAYLOAD_DIAGNOSTICS.json
          if ! git diff --cached --quiet; then
            git commit -m 'chore: record embedded v0.5.0 payload diagnostics'
            git push origin HEAD:agent/autonomous-v0.5.0
          fi
      - name: Require payload verification
        if: always()
        run: test "${{ steps.verify.outcome }}" = "success"
