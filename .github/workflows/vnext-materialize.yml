name: Materialize vNext

on:
  push:
    branches: [agent/vnext-0.4.0]
    paths:
      - scripts/vnext_upgrade.py
      - .github/workflows/vnext-materialize.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/vnext-0.4.0
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install --upgrade pip PyYAML jsonschema coverage
      - name: Generate v0.4.0 tree
        run: python scripts/vnext_upgrade.py
      - name: Run repository audit and complete tests
        run: |
          python scripts/audit_repository.py
          python -m unittest discover -s tests -p 'test_*.py' -v
          python -m coverage run -m unittest discover -s tests -p 'test_vnext_release.py'
          python -m coverage report --include='tsao_researcher/*' --fail-under=65
      - name: Commit generated release
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No generated changes to commit'
          else
            git commit -m 'feat: materialize TsaoSciResearcher v0.4.0'
            git push origin HEAD:agent/vnext-0.4.0
          fi
