name: Audit Snapshot

on:
  push:
    branches: [agent/tsao-sci-researcher-v040-reaudit]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: audit-snapshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONNOUSERSITE: "1"
    steps:
      - name: Checkout exact branch commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install audit dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - name: Generate audit evidence
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/tsr-audit"
          git rev-parse HEAD > "$RUNNER_TEMP/tsr-audit/HEAD.txt"
          python scripts/audit_repository.py --json > "$RUNNER_TEMP/tsr-audit/repository-audit.json"
          python - <<'PY' > "$RUNNER_TEMP/tsr-audit/SOURCE_TREE_SHA256SUMS"
          from scripts.generate_checksums import build
          print(build(), end="")
          PY
          tar --sort=name --mtime='UTC 1980-01-01' --owner=0 --group=0 --numeric-owner \
            --exclude=.git --exclude=.pytest_cache --exclude=.mypy_cache --exclude=.ruff_cache \
            --exclude=.hypothesis --exclude=__pycache__ --exclude=build --exclude=dist \
            -cf "$RUNNER_TEMP/tsr-audit/repository.tar" .
          sha256sum "$RUNNER_TEMP/tsr-audit/repository.tar" > "$RUNNER_TEMP/tsr-audit/repository.tar.sha256"
      - name: Upload audit evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tsr-audit-snapshot
          path: ${{ runner.temp }}/tsr-audit
          if-no-files-found: error
          retention-days: 7
