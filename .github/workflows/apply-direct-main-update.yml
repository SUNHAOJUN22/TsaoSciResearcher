name: Apply verified direct-main v0.5.2 update

on:
  push:
    branches: [main]
    paths:
      - .github/direct-main-update/**
      - .github/workflows/apply-direct-main-update.yml

permissions:
  contents: write

concurrency:
  group: direct-main-v052-update
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Detect staged payload
        id: staged
        shell: bash
        run: |
          if compgen -G '.github/direct-main-update/part-*.b64' > /dev/null; then
            echo 'apply=true' >> "$GITHUB_OUTPUT"
          else
            echo 'apply=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.staged.outputs.apply == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-ci.lock

      - name: Reconstruct and verify checksum-bound patch
        if: steps.staged.outputs.apply == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import base64
          import hashlib
          import lzma
          from pathlib import Path

          expected = [
              (".github/direct-main-update/part-00.b64", "1247089e427d628a149adc79aa6e4f0a32fbbbe71f432bb8736a40cc43d848a2"),
              (".github/direct-main-update/part-01.b64", "29c977de892924143d3a46e1997a75b7bbaaca1839d7b98dee76461213a33e3a"),
              (".github/direct-main-update/part-02.b64", "97534cffe7acb2fa45659271c99f20dcb05ea03e4381cef99041dd7ecb0664bc"),
              (".github/direct-main-update/part-03.b64", "20c981563294c6c768e415920b6a565552f9260990699d6a0fbdd6fa76608928"),
              (".github/direct-main-update/part-04.b64", "8ace73c81e87ed7af69e9f7c0fe8154779bfcec5061495b0e792bd59105bdfdc"),
              (".github/direct-main-update/part-05.b64", "a0676b95ae2b1f2882c12aabae60dd71d7a98b013d49a9810ac20ce0ebe39304"),
              (".github/direct-main-update/part-06.b64", "ac71e3db9c37f93cf208b74fba2a9173d732986a2bd71228dab0bb2fd5082e8d"),
              (".github/direct-main-update/part-07a.b64", "a08b391a9d21195295b4ae57e851510abe32f76b24e159199143f104b6850624"),
              (".github/direct-main-update/part-07b.b64", "f90b249e8ed44f55c88ca0094e7f250000febd44dc98605b28909c77c194f98d"),
              (".github/direct-main-update/part-08.b64", "96aad1de2cc699b7a4384a626915650075efc043e8dafdf241ff8409c960b68f"),
          ]
          parts: list[bytes] = []
          for filename, digest in expected:
              path = Path(filename)
              compact = b"".join(path.read_bytes().split())
              actual = hashlib.sha256(compact).hexdigest()
              print(f"part={path.name} bytes={len(compact)} sha256={actual}")
              if actual != digest:
                  raise SystemExit(f"{path.name} digest mismatch")
              parts.append(compact)

          encoded = b"".join(parts)
          if hashlib.sha256(encoded).hexdigest() != "08a878aa9adf592f95dd4fbb54df6c5183482588f3bbc075af6486a95c27e65e":
              raise SystemExit("combined Base64 digest mismatch")
          compressed = base64.b64decode(encoded, validate=True)
          if hashlib.sha256(compressed).hexdigest() != "cc598185d21d7b86a58e442c1d579479899990345cc64a17b5cab0c60e823cb3":
              raise SystemExit("XZ digest mismatch")
          patch = lzma.decompress(compressed)
          if hashlib.sha256(patch).hexdigest() != "4ce791cc156610a3601dd6d6f039b5e686761485260a0dfc4cf9d54786aadd69":
              raise SystemExit("raw patch digest mismatch")
          Path("/tmp/direct-main.patch").write_bytes(patch)
          PY
          git apply --3way --whitespace=nowarn \
            --exclude=.github/workflows/ci.yml \
            --exclude=SHA256SUMS \
            /tmp/direct-main.patch
          rm -rf .github/direct-main-update

      - name: Install exact validation dependencies
        if: steps.staged.outputs.apply == 'true'
        run: |
          python -m pip install --disable-pip-version-check -r requirements-ci.lock
          python -m pip install --disable-pip-version-check -e . --no-deps
          python -m pip check

      - name: Format and verify materialized source
        if: steps.staged.outputs.apply == 'true'
        env:
          PYTHONDONTWRITEBYTECODE: '1'
          PYTHONNOUSERSITE: '1'
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
        run: |
          python -m ruff format scripts tsao_researcher tests
          python scripts/build_readme_facts.py --write
          python scripts/validate_schemas.py
          python scripts/validate_structure.py
          python scripts/build_capability_index.py --check
          python scripts/route_task.py --self-test
          python scripts/validate_figure.py examples/figure-contract.json
          python -m pytest -q -p hypothesis.extra.pytestplugin \
            --ignore=tests/test_checksums.py \
            --ignore=tests/test_repository_audit.py
          python -m ruff format --check scripts tsao_researcher tests
          python -m ruff check scripts tsao_researcher tests
          python -m mypy scripts tsao_researcher
          python -m bandit -q -lll -r scripts tsao_researcher
          python scripts/run_mutation_smoke.py --json-out /tmp/mutation-results.json
          python scripts/performance_smoke.py --json-out /tmp/performance.json
          rm -rf dist-a dist-b
          python scripts/package_release.py --out dist-a
          python scripts/package_release.py --out dist-b
          A="$(find dist-a -type f -name '*.zip' | sort | head -n 1)"
          B="$(find dist-b -type f -name '*.zip' | sort | head -n 1)"
          test -n "$A" && test -n "$B"
          cmp "$A" "$B"
          python scripts/validate_release.py

      - name: Archive verified materialized source
        if: steps.staged.outputs.apply == 'true'
        shell: bash
        run: |
          rm -rf dist-a dist-b artifacts .coverage
          tar --exclude=.git -czf /tmp/materialized-main-v052.tar.gz .

      - name: Upload materialized source
        if: steps.staged.outputs.apply == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: materialized-main-v052
          path: /tmp/materialized-main-v052.tar.gz
          if-no-files-found: error
          retention-days: 7

      - name: Commit verified source directly to main
        if: steps.staged.outputs.apply == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: align TsaoSciResearcher v0.5.2 with verified design'
          git push origin HEAD:main
