name: Fix dashboard source once

on:
  push:
    branches: [main]
    paths:
      - .github/fix-dashboard-source-trigger

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.lock
      - name: Install exact dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-ci.lock
      - name: Fix and validate dashboard sources
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          generator = Path("scripts/build_test_dashboard.py")
          text = generator.read_text(encoding="utf-8")
          old = "展示已记录的软件证据，不替代科学判断或人工评审。"
          new = "展示已记录的软件证据,不替代科学判断或人工评审。"
          if text.count(old) != 1:
              raise SystemExit(f"generator replacement count={text.count(old)}")
          generator.write_text(text.replace(old, new), encoding="utf-8", newline="\n")

          materializer = Path("scripts/finalize_test_dashboard.py")
          text = materializer.read_text(encoding="utf-8")
          old = "它展示软件门禁结果，不替代科学结论或人工审批。"
          new = "它展示软件门禁结果,不替代科学结论或人工审批。"
          if text.count(old) != 1:
              raise SystemExit(f"materializer replacement count={text.count(old)}")
          text = text.replace(old, new)
          marker = '    ".github/finalize-test-dashboard-status.json",\n'
          addition = marker + (
              '    ".github/workflows/diagnose-dashboard-ruff.yml",\n'
              '    ".github/diagnose-dashboard-ruff-trigger",\n'
              '    ".github/dashboard-ruff-diagnostics.txt",\n'
              '    ".github/workflows/fix-dashboard-source.yml",\n'
              '    ".github/fix-dashboard-source-trigger",\n'
          )
          if ".github/workflows/fix-dashboard-source.yml" not in text:
              if text.count(marker) != 1:
                  raise SystemExit("temporary path marker mismatch")
              text = text.replace(marker, addition, 1)
          materializer.write_text(text, encoding="utf-8", newline="\n")
          PY
          python -m ruff check --fix scripts/build_test_dashboard.py scripts/finalize_test_dashboard.py
          python -m ruff format scripts/build_test_dashboard.py scripts/finalize_test_dashboard.py
          python -m ruff check scripts/build_test_dashboard.py scripts/finalize_test_dashboard.py
          python -m ruff format --check scripts/build_test_dashboard.py scripts/finalize_test_dashboard.py
          python -m py_compile scripts/build_test_dashboard.py scripts/finalize_test_dashboard.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/build_test_dashboard.py scripts/finalize_test_dashboard.py
          git commit -m 'fix: satisfy dashboard source quality gates'
          git push origin HEAD:main
