<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TsaoSciResearcher scientific quality dashboard</title>
<style>
:root{--bg:#f5f7fb;--panel:#fff;--text:#172033;--muted:#647084;--border:#d8e0ea;--pass:#247a48;--warn:#9a6700;--block:#b42318}
@media(prefers-color-scheme:dark){:root{--bg:#111827;--panel:#172033;--text:#f3f6fb;--muted:#a9b4c4;--border:#334155}}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}main{max-width:1180px;margin:auto;padding:32px 20px 48px}h1{margin:0}p{color:var(--muted)}.metrics,.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;margin-top:24px}.metric,article{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:20px}.metric strong{display:block;font-size:2rem}.badge{display:inline-block;border:1px solid currentColor;border-radius:999px;padding:7px 12px;font-weight:700}.PASS{color:var(--pass)}.WARN{color:var(--warn)}.BLOCK{color:var(--block)}.controls{display:flex;gap:10px;flex-wrap:wrap;margin:24px 0 6px}button{font:inherit;padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:var(--panel);color:var(--text);cursor:pointer}button[aria-pressed="true"]{font-weight:700;text-decoration:underline}pre{white-space:pre-wrap;overflow:auto;background:color-mix(in srgb,var(--bg) 70%,transparent);padding:12px;border-radius:12px}li{margin:.65rem 0}footer{margin-top:24px;color:var(--muted)}
</style></head><body><main><h1>Scientific quality guard dashboard</h1><p>Executable controls turn research-method rules into deterministic, inspectable checks.</p><div class="metrics" id="metrics"></div><div class="controls"><button data-filter="ALL" aria-pressed="true">All</button><button data-filter="PASS" aria-pressed="false">PASS</button><button data-filter="WARN" aria-pressed="false">WARN</button><button data-filter="BLOCK" aria-pressed="false">BLOCK</button></div><div class="grid" id="grid"></div><footer>These guards constrain unsupported wording and incomplete boundaries; they do not replace qualified scientific review.</footer></main>
<script>const data={"guards": [{"payload": {"kind": "measurement-boundary", "spec": {"applicability": "same thermal history and baseline protocol", "calibration_or_reference": "indium calibration and declared reference enthalpy", "conditions": ["10 K/min", "nitrogen"], "data_reduction": "declared baseline and integration limits", "detection_limit": "method-specific reporting threshold", "exclusions": "not a direct phase-fraction measurement", "measurand": "crystallinity", "method": "DSC first-heating enthalpy", "replication": "three independently prepared specimens", "sample": "conditioned polymer specimen", "traceability": "raw thermogram and analysis record", "uncertainty": "repeatability and reference-enthalpy contribution", "unit": "%"}}, "result": {"details": {"applicability": "same thermal history and baseline protocol", "calibration_or_reference": "indium calibration and declared reference enthalpy", "completeness_score": 100, "conditions": ["10 K/min", "nitrogen"], "data_reduction": "declared baseline and integration limits", "detection_limit": "method-specific reporting threshold", "exclusions": "not a direct phase-fraction measurement", "measurand": "crystallinity", "method": "DSC first-heating enthalpy", "replication": "three independently prepared specimens", "sample": "conditioned polymer specimen", "traceability": "raw thermogram and analysis record", "uncertainty": "repeatability and reference-enthalpy contribution", "unit": "%"}, "finding_counts": {"BLOCK": 0, "PASS": 1, "WARN": 0}, "findings": [{"code": "MB-COMPLETE", "message": "Operational measurement boundary is explicit.", "status": "PASS"}], "kind": "measurement-boundary", "status": "PASS"}, "summary": "Operational definition, calibration, uncertainty and applicability are explicit.", "title": "Measurement boundary"}, {"payload": {"kind": "structure-property-plan", "spec": {"alternative_explanations": ["crystallinity", "thermal history"], "applicability": "tested material family and cooling window", "confounders": ["specimen thickness", "electrode contact"], "conservation_constraints": ["mass balance", "dimensionally consistent units"], "evidence": ["SAXS", "PEA"], "mediator": "higher interfacial density", "processing_or_intervention": "controlled cooling protocol", "property": "charge transport response", "scale_bridge": "lamellar organization to mesoscopic interfaces", "statistical_basis": "replicate distributions, not single-point values", "structure": "reduced long period", "testable_prediction": "interfacial metrics should covary with charge response", "uncertainty": "replicate dispersion and model sensitivity", "validation_strategy": "independent morphology and electrical measurements"}}, "result": {"details": {"alternative_explanations": ["crystallinity", "thermal history"], "applicability": "tested material family and cooling window", "chain": ["reduced long period", "higher interfacial density", "charge transport response"], "completeness_score": 100, "confounders": ["specimen thickness", "electrode contact"], "conservation_constraints": ["mass balance", "dimensionally consistent units"], "evidence": ["SAXS", "PEA"], "processing_or_intervention": "controlled cooling protocol", "scale_bridge": "lamellar organization to mesoscopic interfaces", "statistical_basis": "replicate distributions, not single-point values", "testable_prediction": "interfacial metrics should covary with charge response", "uncertainty": "replicate dispersion and model sensitivity", "validation_strategy": "independent morphology and electrical measurements"}, "finding_counts": {"BLOCK": 0, "PASS": 1, "WARN": 0}, "findings": [{"code": "SP-CHAIN", "message": "Structure, mediator and property are all explicit.", "status": "PASS"}], "kind": "structure-property-plan", "status": "PASS"}, "summary": "The chain records intervention, structure, mediator, response and competing explanations.", "title": "Structure-property planner"}, {"payload": {"kind": "causality-guard", "spec": {"claim": "The morphology causes the breakdown improvement.", "comparison_or_control": true, "confounders_addressed": false, "design": "cross-sectional observational comparison", "intervention_or_natural_experiment": false, "mechanism_tested": false, "replication": true, "temporal_order": true, "uncertainty_reported": true}}, "result": {"details": {"causal_wording_detected": true, "claim": "The morphology causes the breakdown improvement.", "comparison_or_control": true, "completeness_score": 57, "confounders_addressed": false, "design": "cross-sectional observational comparison", "intervention_or_natural_experiment": false, "mechanism_tested": false, "replication": true, "temporal_order": true, "uncertainty_reported": true, "verdict": "association-only"}, "finding_counts": {"BLOCK": 1, "PASS": 0, "WARN": 0}, "findings": [{"code": "CG-OVERCLAIM", "message": "Causal wording exceeds the declared study design.", "status": "BLOCK"}], "kind": "causality-guard", "status": "BLOCK"}, "summary": "Association-only evidence blocks causal wording in English and Chinese.", "title": "Causality guard"}, {"payload": {"kind": "evidence-traceability", "spec": {"claim": "The recorded workflow completed successfully.", "claim_id": "CLM-001", "evidence_ids": ["EVD-001", "RUN-001"], "evidence_roles": ["direct", "execution-receipt"], "execution_claim": true, "execution_receipts": ["actions/run/123"], "source_locators": ["paper.pdf#page=4", "actions/run/123"], "uncertainty": "Software completion does not imply scientific acceptance."}}, "result": {"details": {"bidirectional_traceability": true, "claim": "The recorded workflow completed successfully.", "claim_id": "CLM-001", "completeness_score": 100, "evidence_ids": ["EVD-001", "RUN-001"], "evidence_roles": ["direct", "execution-receipt"], "execution_claim": true, "execution_receipts": ["actions/run/123"], "source_locators": ["paper.pdf#page=4", "actions/run/123"], "uncertainty": "Software completion does not imply scientific acceptance."}, "finding_counts": {"BLOCK": 0, "PASS": 1, "WARN": 0}, "findings": [{"code": "ET-COMPLETE", "message": "Claim, evidence, locators and execution boundary are traceable.", "status": "PASS"}], "kind": "evidence-traceability", "status": "PASS"}, "summary": "Claims link to evidence locators and execution claims require receipts.", "title": "Evidence traceability"}], "summary": {"average_completeness": 89, "guard_count": 4, "statuses": {"BLOCK": 1, "PASS": 3, "WARN": 0}, "truth_boundary": "Software guards constrain claims; they do not grant scientific acceptance."}};const metrics=document.getElementById('metrics'),grid=document.getElementById('grid');for(const [label,value] of [['Guards',data.summary.guard_count],['PASS',data.summary.statuses.PASS],['BLOCK',data.summary.statuses.BLOCK],['Average completeness',data.summary.average_completeness+'%']]){const d=document.createElement('div');d.className='metric';d.innerHTML=`<strong>${value}</strong><span>${label}</span>`;metrics.appendChild(d)}function render(filter){grid.textContent='';for(const row of data.guards){const r=row.result;if(filter!=='ALL'&&r.status!==filter)continue;const a=document.createElement('article');a.dataset.status=r.status;a.innerHTML=`<span class="badge ${r.status}">${r.status}</span><h2>${row.title}</h2><p>${row.summary}</p><p><strong>${r.details.completeness_score??0}%</strong> declared completeness</p><ul>${r.findings.map(f=>`<li><strong>${f.code}</strong>: ${f.message}</li>`).join('')}</ul><button class="machine">Show machine result</button><pre hidden>${JSON.stringify(r,null,2)}</pre>`;const b=a.querySelector('.machine'),p=a.querySelector('pre');b.onclick=()=>{p.hidden=!p.hidden;b.textContent=p.hidden?'Show machine result':'Hide machine result'};grid.appendChild(a)}}for(const button of document.querySelectorAll('[data-filter]')){button.onclick=()=>{for(const item of document.querySelectorAll('[data-filter]'))item.setAttribute('aria-pressed','false');button.setAttribute('aria-pressed','true');render(button.dataset.filter)}}render('ALL');</script></body></html>
